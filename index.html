<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>POST App</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
input, textarea, select, button { font-family: inherit; }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API = "https://post-app-backend-dqtp.onrender.com/api";
const YELLOW = "#FFD600", GREEN = "#00C853", RED = "#FF1744", BLUE = "#2979FF";
const ACCENTS = [YELLOW, GREEN, RED, BLUE];

async function api(path, method = "GET", body = null, token = null) {
  const headers = { "Content-Type": "application/json" };
  if (token) headers["Authorization"] = `Bearer ${token}`;
  const res = await fetch(`${API}${path}`, { method, headers, body: body ? JSON.stringify(body) : null });
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || "Error");
  return data;
}

const inp = { width:"100%", background:"#0a0a0a", border:"1px solid #333", borderRadius:12, padding:"12px 16px", color:"#fff", fontSize:15, outline:"none", boxSizing:"border-box" };
const btn = { width:"100%", padding:14, background:YELLOW, color:"#000", fontWeight:900, fontSize:15, border:"none", borderRadius:14, cursor:"pointer" };

function Toast({ toast }) {
  if (!toast) return null;
  return <div style={{ position:"fixed", top:20, left:"50%", transform:"translateX(-50%)", background:"#1a1a1a", border:`1px solid ${toast.color}`, color:toast.color, padding:"12px 24px", borderRadius:16, zIndex:9999, fontWeight:700, fontSize:14, whiteSpace:"nowrap" }}>{toast.msg}</div>;
}

function Avatar({ u, size=44 }) {
  const r = Math.min(size * 0.35, 16);
  if (u?.avatar_photo) return <img src={u.avatar_photo} style={{ width:size, height:size, borderRadius:r, objectFit:"cover", flexShrink:0 }} />;
  return <div style={{ width:size, height:size, borderRadius:r, background:u?.avatar_bg||YELLOW, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:size*0.45, flexShrink:0 }}>{u?.avatar_letter||"?"}</div>;
}

// ── Auth Screens ──────────────────────────────────────────
function LoginScreen({ onLogin, onGoSignup, toast }) {
  const [email, setEmail] = useState(""); const [pass, setPass] = useState("");
  return (
    <div style={{ minHeight:"100vh", background:"#0a0a0a", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <Toast toast={toast} />
      <div style={{ background:"#111", border:`2px solid ${YELLOW}`, borderRadius:24, padding:32, width:"100%", maxWidth:400 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ fontSize:52, fontWeight:900, color:YELLOW, letterSpacing:8 }}>POST</div>
          <div style={{ color:"#666", fontSize:14, marginTop:6 }}>Connect with the world 🌍</div>
        </div>
        <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email" type="email" style={inp} />
        <input value={pass} onChange={e=>setPass(e.target.value)} placeholder="Password" type="password" style={{...inp, marginTop:12}} onKeyDown={e=>e.key==="Enter"&&onLogin(email,pass)} />
        <button onClick={()=>onLogin(email,pass)} style={{...btn, marginTop:20}}>LOGIN →</button>
        <div style={{ textAlign:"center", marginTop:16, color:"#666", fontSize:14 }}>New here? <span onClick={onGoSignup} style={{ color:YELLOW, cursor:"pointer", fontWeight:700 }}>Sign Up</span></div>
      </div>
    </div>
  );
}

function SignupScreen({ onSignup, onGoLogin, toast }) {
  const [name, setName] = useState(""); const [email, setEmail] = useState(""); const [pass, setPass] = useState("");
  return (
    <div style={{ minHeight:"100vh", background:"#0a0a0a", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <Toast toast={toast} />
      <div style={{ background:"#111", border:`2px solid ${YELLOW}`, borderRadius:24, padding:32, width:"100%", maxWidth:400 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ fontSize:52, fontWeight:900, color:YELLOW, letterSpacing:8 }}>POST</div>
          <div style={{ color:"#666", fontSize:14, marginTop:6 }}>Join the world 🚀</div>
        </div>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your Name" style={inp} />
        <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email" type="email" style={{...inp, marginTop:12}} />
        <input value={pass} onChange={e=>setPass(e.target.value)} placeholder="Password (min 6 chars)" type="password" style={{...inp, marginTop:12}} />
        <button onClick={()=>onSignup(name,email,pass)} style={{...btn, marginTop:20}}>CREATE ACCOUNT →</button>
        <div style={{ textAlign:"center", marginTop:16, color:"#666", fontSize:14 }}>Have account? <span onClick={onGoLogin} style={{ color:YELLOW, cursor:"pointer", fontWeight:700 }}>Login</span></div>
      </div>
    </div>
  );
}

function OtpScreen({ onVerify, email, demoOtp, toast }) {
  const [otp, setOtp] = useState("");
  return (
    <div style={{ minHeight:"100vh", background:"#0a0a0a", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <Toast toast={toast} />
      <div style={{ background:"#111", border:`2px solid ${YELLOW}`, borderRadius:24, padding:32, width:"100%", maxWidth:400 }}>
        <div style={{ textAlign:"center", marginBottom:24 }}>
          <div style={{ fontSize:36, fontWeight:900, color:YELLOW }}>Verify Email ✉️</div>
          <div style={{ color:"#666", fontSize:14, marginTop:8 }}>OTP sent to {email}</div>
          {demoOtp && <div style={{ marginTop:16, background:"#0a1a0a", border:`1px solid ${GREEN}`, borderRadius:12, padding:"12px 16px", color:GREEN, fontWeight:900, fontSize:22, letterSpacing:6 }}>{demoOtp}</div>}
          {demoOtp && <div style={{ color:"#666", fontSize:12, marginTop:6 }}>↑ Demo OTP (no email needed)</div>}
        </div>
        <input value={otp} onChange={e=>setOtp(e.target.value)} placeholder="Enter OTP" style={{...inp, textAlign:"center", fontSize:24, letterSpacing:8}} maxLength={4} />
        <button onClick={()=>onVerify(otp)} style={{...btn, marginTop:20}}>VERIFY →</button>
      </div>
    </div>
  );
}

// ── Post Card ────────────────────────────────────────────────
function PostCard({ post, user, onLike, onDelete, onComment }) {
  const [showC, setShowC] = useState(false); const [ct, setCt] = useState("");
  const myLike = post.likes?.find(l=>l.user_id===user.id);
  return (
    <div style={{ background:"#111", border:"1px solid #222", borderRadius:20, marginBottom:14, overflow:"hidden" }}>
      <div style={{ padding:"14px 16px", display:"flex", gap:12, alignItems:"flex-start" }}>
        <Avatar u={{ avatar_bg: post.avatar_bg, avatar_letter: post.avatar_letter, avatar_photo: post.avatar_photo }} size={44} />
        <div style={{ flex:1 }}>
          <div style={{ fontWeight:700, fontSize:15 }}>{post.user_name}</div>
          <div style={{ color:"#666", fontSize:12 }}>{post.user_handle}</div>
        </div>
        {post.user_id===user.id && <button onClick={()=>onDelete(post.id)} style={{ background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:18, padding:4 }}>🗑</button>}
      </div>
      <div style={{ padding:"0 16px 14px", fontSize:15, lineHeight:1.65 }}>{post.content}</div>
      {post.location && <div style={{ padding:"0 16px 12px", fontSize:12, color:"#666" }}>📍 {post.location}</div>}
      <div style={{ borderTop:"1px solid #1a1a1a", display:"flex" }}>
        <div style={{ flex:1, padding:"10px 0", display:"flex", justifyContent:"center", alignItems:"center", gap:8 }}>
          {ACCENTS.map(c=><button key={c} onClick={()=>onLike(post.id,c)} style={{ width:26, height:26, borderRadius:"50%", background:c, border:myLike?.color===c?"2px solid white":"2px solid transparent", cursor:"pointer" }} />)}
          <span style={{ color:"#666", fontSize:13 }}>{post.likes?.length||0}</span>
        </div>
        <button onClick={()=>setShowC(!showC)} style={{ flex:1, padding:"10px 0", background:"none", border:"none", borderLeft:"1px solid #1a1a1a", color:"#666", cursor:"pointer", fontSize:13 }}>💬 {post.comments?.length||0}</button>
      </div>
      {showC && (
        <div style={{ borderTop:"1px solid #1a1a1a", padding:12 }}>
          {post.comments?.map((c,i)=><div key={i} style={{ fontSize:13, padding:"6px 0", borderBottom:"1px solid #161616" }}><span style={{ fontWeight:700, color:YELLOW }}>{c.user_name}: </span>{c.text}</div>)}
          <div style={{ display:"flex", gap:8, marginTop:10 }}>
            <input value={ct} onChange={e=>setCt(e.target.value)} placeholder="Comment..." style={{...inp, flex:1, padding:"8px 12px", fontSize:13}} onKeyDown={e=>e.key==="Enter"&&ct.trim()&&(onComment(post.id,ct),setCt(""))} />
            <button onClick={()=>ct.trim()&&(onComment(post.id,ct),setCt(""))} style={{ background:YELLOW, color:"#000", border:"none", borderRadius:10, padding:"8px 14px", fontWeight:700, cursor:"pointer", fontSize:13 }}>→</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Home Tab ─────────────────────────────────────────────────
function HomeTab({ token, user, showToast }) {
  const [posts, setPosts] = useState([]); const [loading, setLoading] = useState(true); const [showCompose, setShowCompose] = useState(false);
  const load = async () => { try { setPosts(await api("/posts","GET",null,token)); } catch(e){showToast(e.message,RED);} setLoading(false); };
  useEffect(()=>{load();},[]);
  const like = async (pid,c) => { try{await api(`/posts/${pid}/like`,"POST",{color:c},token);load();}catch(e){} };
  const del = async (pid) => { try{await api(`/posts/${pid}`,"DELETE",null,token);showToast("Deleted",RED);load();}catch(e){showToast(e.message,RED);} };
  const comment = async (pid,text) => { try{await api(`/posts/${pid}/comments`,"POST",{text},token);load();}catch(e){} };
  return (
    <div style={{ maxWidth:600, margin:"0 auto", padding:"16px 14px" }}>
      {loading && <div style={{ textAlign:"center", padding:40, color:"#555" }}>Loading posts...</div>}
      {!loading&&posts.length===0 && <div style={{ textAlign:"center", padding:60, color:"#555" }}>No posts yet. Be the first! 🚀</div>}
      {posts.map(p=><PostCard key={p.id} post={p} user={user} onLike={like} onDelete={del} onComment={comment} />)}
      <button onClick={()=>setShowCompose(true)} style={{ position:"fixed", bottom:90, right:20, width:58, height:58, background:YELLOW, color:"#000", borderRadius:"50%", fontSize:30, fontWeight:900, border:"none", cursor:"pointer", boxShadow:"0 4px 20px rgba(255,214,0,0.4)", zIndex:40, display:"flex", alignItems:"center", justifyContent:"center" }}>+</button>
      {showCompose && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.97)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <ComposeModal token={token} onClose={()=>setShowCompose(false)} onPost={()=>{setShowCompose(false);load();showToast("Posted! 🌍",GREEN);}} showToast={showToast} />
        </div>
      )}
    </div>
  );
}

function ComposeModal({ token, onClose, onPost, showToast }) {
  const [text, setText] = useState(""); const [accent, setAccent] = useState(YELLOW); const [loc, setLoc] = useState("");
  const post = async () => { if(!text.trim())return; try{await api("/posts","POST",{content:text,accent,location:loc},token);onPost();}catch(e){showToast(e.message,RED);} };
  return (
    <div style={{ background:"#111", borderRadius:24, padding:24, width:"100%", maxWidth:480 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <span style={{ fontWeight:900, fontSize:20 }}>New Post</span>
        <button onClick={onClose} style={{ color:"#666", background:"none", border:"none", cursor:"pointer", fontSize:22 }}>✕</button>
      </div>
      <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="What's on your mind?" style={{...inp, height:120, resize:"none"}} />
      <input value={loc} onChange={e=>setLoc(e.target.value)} placeholder="📍 Location (optional)" style={{...inp, marginTop:10, fontSize:13}} />
      <div style={{ display:"flex", gap:10, margin:"14px 0" }}>
        {ACCENTS.map(c=><button key={c} onClick={()=>setAccent(c)} style={{ width:38, height:38, borderRadius:11, background:c, border:accent===c?"3px solid white":"3px solid transparent", cursor:"pointer" }} />)}
      </div>
      <button onClick={post} style={btn}>SHARE GLOBALLY 🌍</button>
    </div>
  );
}

// ── Discover Tab ─────────────────────────────────────────────
function DiscoverTab({ token, user, showToast }) {
  const [users, setUsers] = useState([]); const [q, setQ] = useState(""); const [loading, setLoading] = useState(true);
  useEffect(()=>{ api(`/users${q?`?q=${q}`:""}`, "GET",null,token).then(setUsers).catch(()=>{}).finally(()=>setLoading(false)); },[q]);
  const connect = async (uid) => { try{await api("/friends/request","POST",{target_user_id:uid},token);showToast("Request sent! 🤝",GREEN);}catch(e){showToast(e.message,RED);} };
  return (
    <div style={{ maxWidth:600, margin:"0 auto", padding:"16px 14px" }}>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Search people..." style={{...inp, marginBottom:16}} />
      {loading&&<div style={{textAlign:"center",padding:40,color:"#555"}}>Loading...</div>}
      {users.map(u=>(
        <div key={u.id} style={{ background:"#111", border:"1px solid #222", borderRadius:16, padding:"14px 16px", marginBottom:10, display:"flex", alignItems:"center", gap:12 }}>
          <Avatar u={u} size={44} />
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:700 }}>{u.name}</div>
            <div style={{ color:"#666", fontSize:12 }}>{u.handle}{u.location?` • ${u.location}`:""}</div>
            {u.about&&<div style={{ color:"#888", fontSize:12, marginTop:2 }}>{u.about}</div>}
          </div>
          <button onClick={()=>connect(u.id)} style={{ background:YELLOW, color:"#000", border:"none", borderRadius:10, padding:"8px 14px", fontWeight:700, cursor:"pointer", fontSize:13 }}>Connect</button>
        </div>
      ))}
    </div>
  );
}

// ── Friends Tab ───────────────────────────────────────────────
function FriendsTab({ token, user, showToast }) {
  const [data, setData] = useState({friends:[],pending_incoming:[],pending_outgoing:[]});
  const load = ()=>api("/friends","GET",null,token).then(setData).catch(()=>{});
  useEffect(()=>{load();},[]);
  const accept = async (uid)=>{await api("/friends/accept","POST",{target_user_id:uid},token);showToast("Friend added! 🎉",GREEN);load();};
  const decline = async (uid)=>{await api("/friends/decline","POST",{target_user_id:uid},token);load();};
  return (
    <div style={{ maxWidth:600, margin:"0 auto", padding:"16px 14px" }}>
      {data.pending_incoming.length>0&&<>
        <div style={{ fontWeight:700, color:YELLOW, marginBottom:10, fontSize:12, letterSpacing:2 }}>REQUESTS 📬</div>
        {data.pending_incoming.map(r=>(
          <div key={r.id} style={{ background:"#111", border:`1px solid ${YELLOW}33`, borderRadius:14, padding:"12px 14px", marginBottom:8, display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ flex:1, fontWeight:600, fontSize:14 }}>{r.from_id}</div>
            <button onClick={()=>accept(r.from_id)} style={{ background:GREEN, color:"#000", border:"none", borderRadius:8, padding:"6px 12px", fontWeight:700, cursor:"pointer", fontSize:12 }}>Accept</button>
            <button onClick={()=>decline(r.from_id)} style={{ background:"#333", color:"#fff", border:"none", borderRadius:8, padding:"6px 12px", fontWeight:700, cursor:"pointer", fontSize:12, marginLeft:6 }}>Decline</button>
          </div>
        ))}
      </>}
      <div style={{ fontWeight:700, color:YELLOW, marginBottom:10, marginTop:16, fontSize:12, letterSpacing:2 }}>YOUR FRIENDS 🤝</div>
      {data.friends.length===0&&<div style={{color:"#555",textAlign:"center",padding:30,fontSize:14}}>No friends yet. Go Discover! 🔍</div>}
      {data.friends.map(f=>(
        <div key={f.id} style={{ background:"#111", border:"1px solid #222", borderRadius:14, padding:"12px 14px", marginBottom:8, display:"flex", alignItems:"center", gap:12 }}>
          <Avatar u={f} size={42} />
          <div><div style={{ fontWeight:700 }}>{f.name}</div><div style={{ color:"#666", fontSize:12 }}>{f.handle}</div></div>
        </div>
      ))}
    </div>
  );
}

// ── Messages Tab ──────────────────────────────────────────────
function MessagesTab({ token, user, showToast }) {
  const [friends, setFriends] = useState([]); const [sel, setSel] = useState(null); const [msgs, setMsgs] = useState([]); const [text, setText] = useState(""); const msgEnd = useRef(null);
  useEffect(()=>{api("/friends","GET",null,token).then(d=>setFriends(d.friends)).catch(()=>{});},[]);
  useEffect(()=>{
    if(!sel)return;
    const load=()=>api(`/messages?with_user=${sel.id}`,"GET",null,token).then(setMsgs).catch(()=>{});
    load(); const iv=setInterval(load,5000); return()=>clearInterval(iv);
  },[sel]);
  useEffect(()=>msgEnd.current?.scrollIntoView({behavior:"smooth"}),[msgs]);
  const send = async()=>{
    if(!text.trim()||!sel)return;
    try{await api("/messages","POST",{to_user_id:sel.id,text},token);setText("");const d=await api(`/messages?with_user=${sel.id}`,"GET",null,token);setMsgs(d);}catch(e){showToast(e.message,RED);}
  };
  if(sel) return (
    <div style={{ maxWidth:600, margin:"0 auto", display:"flex", flexDirection:"column", height:"calc(100vh - 130px)" }}>
      <div style={{ padding:"12px 16px", display:"flex", alignItems:"center", gap:10, borderBottom:"1px solid #222" }}>
        <button onClick={()=>setSel(null)} style={{ background:"none", border:"none", color:YELLOW, cursor:"pointer", fontSize:22 }}>←</button>
        <Avatar u={sel} size={36} />
        <div style={{ fontWeight:700 }}>{sel.name}</div>
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:14 }}>
        {msgs.map(m=>(
          <div key={m.id} style={{ marginBottom:10, display:"flex", flexDirection:m.from_id===user.id?"row-reverse":"row" }}>
            <div style={{ background:m.from_id===user.id?YELLOW:"#222", color:m.from_id===user.id?"#000":"#fff", borderRadius:14, padding:"8px 14px", maxWidth:"75%", fontSize:14 }}>{m.text}</div>
          </div>
        ))}
        <div ref={msgEnd} />
      </div>
      <div style={{ padding:"10px 14px", borderTop:"1px solid #222", display:"flex", gap:8 }}>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Message..." style={{...inp, flex:1}} />
        <button onClick={send} style={{ background:YELLOW, color:"#000", border:"none", borderRadius:12, padding:"10px 18px", fontWeight:700, cursor:"pointer" }}>→</button>
      </div>
    </div>
  );
  return (
    <div style={{ maxWidth:600, margin:"0 auto", padding:"16px 14px" }}>
      <div style={{ fontWeight:700, color:YELLOW, marginBottom:12, fontSize:12, letterSpacing:2 }}>MESSAGES 💬</div>
      {friends.length===0&&<div style={{color:"#555",textAlign:"center",padding:40,fontSize:14}}>Add friends to chat!</div>}
      {friends.map(f=>(
        <div key={f.id} onClick={()=>setSel(f)} style={{ background:"#111", border:"1px solid #222", borderRadius:16, padding:"14px 16px", marginBottom:10, display:"flex", alignItems:"center", gap:12, cursor:"pointer" }}>
          <Avatar u={f} size={44} />
          <div><div style={{ fontWeight:700 }}>{f.name}</div><div style={{ color:"#666", fontSize:12 }}>{f.handle}</div></div>
        </div>
      ))}
    </div>
  );
}

// ── Profile Tab ───────────────────────────────────────────────
function ProfileTab({ token, user, setUser, showToast }) {
  const [edit, setEdit] = useState(false); const [name, setName] = useState(user.name||""); const [loc, setLoc] = useState(user.location||""); const [about, setAbout] = useState(user.about||""); const [bg, setBg] = useState(user.avatar_bg||YELLOW);
  const save = async()=>{ try{const u=await api("/profile","PATCH",{name,location:loc,about,avatar_bg:bg},token);setUser(u);setEdit(false);showToast("Updated! ✓",GREEN);}catch(e){showToast(e.message,RED);} };
  return (
    <div style={{ maxWidth:600, margin:"0 auto", padding:"16px 14px" }}>
      <div style={{ background:"#111", border:"1px solid #222", borderRadius:20, padding:24, textAlign:"center" }}>
        <div style={{ margin:"0 auto 16px" }}><Avatar u={user} size={80} /></div>
        <div style={{ fontWeight:900, fontSize:22 }}>{user.name}</div>
        <div style={{ color:"#666", fontSize:14, marginTop:4 }}>{user.handle}</div>
        {user.location&&<div style={{ color:"#666", fontSize:13, marginTop:4 }}>📍 {user.location}</div>}
        {user.about&&<div style={{ color:"#ccc", fontSize:14, marginTop:10, lineHeight:1.5 }}>{user.about}</div>}
        {!edit?(
          <button onClick={()=>setEdit(true)} style={{...btn, marginTop:20, maxWidth:200, margin:"20px auto 0"}}>Edit Profile ✏️</button>
        ):(
          <div style={{ marginTop:20, textAlign:"left" }}>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Name" style={inp} />
            <input value={loc} onChange={e=>setLoc(e.target.value)} placeholder="Location" style={{...inp,marginTop:10}} />
            <textarea value={about} onChange={e=>setAbout(e.target.value)} placeholder="About you..." style={{...inp,height:80,resize:"none",marginTop:10}} />
            <div style={{ display:"flex", gap:8, margin:"14px 0" }}>
              {ACCENTS.map(c=><button key={c} onClick={()=>setBg(c)} style={{ width:36,height:36,borderRadius:10,background:c,border:bg===c?"3px solid white":"3px solid transparent",cursor:"pointer" }} />)}
            </div>
            <button onClick={save} style={btn}>Save Changes ✓</button>
            <button onClick={()=>setEdit(false)} style={{...btn,background:"#333",color:"#fff",marginTop:8}}>Cancel</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("login");
  const [token, setToken] = useState(()=>localStorage.getItem("post_token")||null);
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState("home");
  const [toast, setToast] = useState(null);
  const [pendingEmail, setPendingEmail] = useState("");
  const [demoOtp, setDemoOtp] = useState(null);

  const showToast = (msg, color=YELLOW) => { setToast({msg,color}); setTimeout(()=>setToast(null),3000); };

  useEffect(()=>{
    if(token){ api("/auth/me","GET",null,token).then(u=>{setUser(u);setScreen("app");}).catch(()=>{localStorage.removeItem("post_token");setToken(null);setScreen("login");}); }
  },[token]);

  const login = async(email,pass)=>{ try{const d=await api("/auth/login","POST",{email,password:pass});localStorage.setItem("post_token",d.token);setToken(d.token);}catch(e){showToast(e.message,RED);} };
  const signup = async(name,email,pass)=>{ try{const d=await api("/auth/signup","POST",{name,email,password:pass});setPendingEmail(email);if(d.demo_otp)setDemoOtp(d.demo_otp);setScreen("otp");showToast("OTP sent!",GREEN);}catch(e){showToast(e.message,RED);} };
  const verify = async(otp)=>{ try{const d=await api("/auth/verify-otp","POST",{email:pendingEmail,otp});localStorage.setItem("post_token",d.token);setToken(d.token);setDemoOtp(null);}catch(e){showToast(e.message,RED);} };
  const logout = ()=>{ localStorage.removeItem("post_token");setToken(null);setUser(null);setScreen("login"); };

  if(screen==="login") return <LoginScreen onLogin={login} onGoSignup={()=>setScreen("signup")} toast={toast} />;
  if(screen==="signup") return <SignupScreen onSignup={signup} onGoLogin={()=>setScreen("login")} toast={toast} />;
  if(screen==="otp") return <OtpScreen onVerify={verify} email={pendingEmail} demoOtp={demoOtp} toast={toast} />;
  if(!user) return <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center",color:"#666",fontSize:18}}>Loading...</div>;

  return (
    <div style={{ minHeight:"100vh", background:"#0a0a0a", color:"#fff", paddingBottom:80 }}>
      <Toast toast={toast} />
      <div style={{ position:"sticky", top:0, background:"#050505", borderBottom:"1px solid #1a1a1a", padding:"14px 20px", display:"flex", justifyContent:"space-between", alignItems:"center", zIndex:50 }}>
        <span style={{ fontSize:26, fontWeight:900, letterSpacing:6, color:YELLOW }}>POST</span>
        <button onClick={logout} style={{ color:"#555", background:"none", border:"1px solid #333", borderRadius:8, padding:"6px 12px", cursor:"pointer", fontSize:12 }}>Logout</button>
      </div>
      {tab==="home"&&<HomeTab token={token} user={user} showToast={showToast} />}
      {tab==="discover"&&<DiscoverTab token={token} user={user} showToast={showToast} />}
      {tab==="friends"&&<FriendsTab token={token} user={user} showToast={showToast} />}
      {tab==="messages"&&<MessagesTab token={token} user={user} showToast={showToast} />}
      {tab==="profile"&&<ProfileTab token={token} user={user} setUser={setUser} showToast={showToast} />}
      <div style={{ position:"fixed", bottom:0, left:0, right:0, background:"#050505", borderTop:"1px solid #1a1a1a", display:"flex", justifyContent:"space-around", padding:"10px 0", zIndex:50 }}>
        {[["home","🏠"],["discover","🔍"],["friends","👥"],["messages","💬"],["profile","👤"]].map(([id,icon])=>(
          <button key={id} onClick={()=>setTab(id)} style={{ fontSize:24, background:"none", border:"none", cursor:"pointer", opacity:tab===id?1:0.35, transform:tab===id?"scale(1.2)":"scale(1)", transition:"all 0.15s" }}>{icon}</button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
