<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>POST App</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #ffffff; color: #111111; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
input, textarea, button { font-family: inherit; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #f0f0f0; }
::-webkit-scrollbar-thumb { background: #bbb; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API = "https://post-app-backend-dqtp.onrender.com/api";
const COLORS = {
  yellow: "#FFD600", green: "#00C853", red: "#FF1744", blue: "#29B6F6",
  dark: "#FFFFFF", card: "#FFFFFF", text: "#111111", muted: "#666666",
};
const ACCENTS = [COLORS.yellow, COLORS.green, COLORS.red, COLORS.blue];

async function api(path, method = "GET", body = null, token = null) {
  const headers = { "Content-Type": "application/json" };
  if (token) headers["Authorization"] = `Bearer ${token}`;
  const res = await fetch(`${API}${path}`, { method, headers, body: body ? JSON.stringify(body) : null });
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || "Something went wrong");
  return data;
}

const inputStyle = { width:"100%", background:"#f5f5f5", border:"1px solid #ddd", borderRadius:12, padding:"12px 16px", color:"#111111", fontSize:15, outline:"none", boxSizing:"border-box" };
const btnStyle = { width:"100%", padding:"14px", background:COLORS.yellow, color:"#000", fontWeight:900, fontSize:15, border:"none", borderRadius:14, cursor:"pointer", letterSpacing:1 };

function Toast({ toast }) {
  if (!toast) return null;
  return <div style={{ position:"fixed", top:24, left:"50%", transform:"translateX(-50%)", background:"#ffffff", border:`1px solid ${toast.color}`, color:toast.color, padding:"12px 24px", borderRadius:16, zIndex:9999, fontWeight:700, fontSize:14, whiteSpace:"nowrap" }}>{toast.msg}</div>;
}

function PhoneSignupScreen({ onBack, onSuccess, showToast }) {
  const [step, setStep] = useState("phone"); // phone | otp | details
  const [phone, setPhone] = useState("");
  const [otp, setOtp] = useState("");
  const [name, setName] = useState("");
  const [username, setUsername] = useState("");
  const [dob, setDob] = useState("");
  const [password, setPassword] = useState("");
  const [confirmPassword, setConfirmPassword] = useState("");
  const [agreed, setAgreed] = useState(false);
  const [loading, setLoading] = useState(false);
  const [demoOtp, setDemoOtp] = useState(null);
  const [error, setError] = useState("");

  const calcAge=(d)=>{ const b=new Date(d); const t=new Date(); let age=t.getFullYear()-b.getFullYear(); const m=t.getMonth()-b.getMonth(); if(m<0||(m===0&&t.getDate()<b.getDate()))age--; return age; };

  const sendOtp = async () => {
    if (!phone || phone.length < 10) { showToast("Enter a valid phone number", COLORS.red); return; }
    setLoading(true);
    try {
      const phoneNum = phone.startsWith('+') ? phone : `+91${phone}`;
      const data = await api("/auth/phone-signup-init", "POST", { phone: phoneNum });
      if (data.demo_otp) setDemoOtp(data.demo_otp);
      setStep("otp");
      showToast("OTP sent! 📱", COLORS.green);
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  const verifyOtp = async () => {
    if (!otp || otp.length < 4) { showToast("Enter OTP", COLORS.red); return; }
    setLoading(true);
    try {
      const phoneNum = phone.startsWith('+') ? phone : `+91${phone}`;
      await api("/auth/phone-verify-init", "POST", { phone: phoneNum, otp });
      setStep("details");
      showToast("Phone verified! ✅", COLORS.green);
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  const createAccount = async () => {
    if(!name.trim()||!username.trim()||!dob||password.length<6){setError("Name, username, DOB aur password (min 6) required");return;}
    if(!/^[a-z0-9_]+$/.test(username)){setError("Username: sirf lowercase, numbers, underscore");return;}
    if(calcAge(dob)<13){setError("Account banane ke liye 13 saal ka hona zaroori hai");return;}
    if(password!==confirmPassword){setError("Passwords match nahi kar rahe ❌");return;}
    if(!agreed){setError("Terms of Service aur Privacy Policy accept karo");return;}
    setError("");
    setLoading(true);
    try {
      const phoneNum = phone.startsWith('+') ? phone : `+91${phone}`;
      const data = await api("/auth/phone-signup", "POST", { phone: phoneNum, name, username, password, dob });
      onSuccess(data.token);
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  return (
    <div style={{ minHeight:"100vh", background:COLORS.dark, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ background:"#ffffff", border:`1px solid ${COLORS.yellow}`, borderRadius:24, padding:32, width:"100%", maxWidth:400 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ fontSize:56, fontWeight:900, letterSpacing:8 }}><span style={{color:'#FFD600'}}>P</span><span style={{color:'#00C853'}}>O</span><span style={{color:'#FF1744'}}>S</span><span style={{color:'#29B6F6'}}>T</span></div>
          <div style={{ color:COLORS.muted, fontSize:14, marginTop:8 }}>
            {step==="phone" ? "Join the world 🌐" : step==="otp" ? "Verify OTP" : "Create Account"}
          </div>
        </div>

        {step==="phone" && <>
          <div style={{ display:"flex", gap:8 }}>
            <div style={{ background:"#f5f5f5", border:"1px solid #ddd", borderRadius:12, padding:"12px 16px", color:"#111111", fontSize:15, minWidth:70, textAlign:"center" }}>+91</div>
            <input value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,''))} placeholder="Phone number" type="tel" maxLength={10} style={{...inputStyle, flex:1}} />
          </div>
          <button onClick={sendOtp} disabled={loading} style={{...btnStyle, marginTop:20, opacity:loading?0.7:1}}>
            {loading ? "Sending..." : "SEND OTP →"}
          </button>
        </>}

        {step==="otp" && <>
          <div style={{ color:COLORS.muted, fontSize:13, marginBottom:16, textAlign:"center" }}>
            OTP sent to: {phone.startsWith('+')?phone:`+91${phone}`}
          </div>
          {demoOtp && <div style={{ background:"#0a1a0a", border:`1px solid ${COLORS.green}`, borderRadius:12, padding:"12px 16px", color:COLORS.green, fontWeight:900, fontSize:22, letterSpacing:6, textAlign:"center", marginBottom:16 }}>{demoOtp}</div>}
          <input value={otp} onChange={e=>setOtp(e.target.value.replace(/\D/g,''))} placeholder="4-digit OTP" maxLength={6} style={{...inputStyle, textAlign:"center", fontSize:24, letterSpacing:8}} />
          <button onClick={verifyOtp} disabled={loading} style={{...btnStyle, marginTop:20, opacity:loading?0.7:1}}>
            {loading ? "Verifying..." : "VERIFY →"}
          </button>
        </>}

        {step==="details" && <>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" style={inputStyle} />
          <div style={{position:"relative",marginTop:12}}>
            <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:COLORS.muted,fontSize:15}}>@</span>
            <input value={username} onChange={e=>setUsername(e.target.value.toLowerCase().replace(/[^a-z0-9_]/g,""))} placeholder="username" style={{...inputStyle,paddingLeft:30}} />
          </div>
          <div style={{marginTop:12}}>
            <div style={{color:COLORS.muted,fontSize:12,marginBottom:6}}>Date of Birth</div>
            <input value={dob} onChange={e=>setDob(e.target.value)} type="date" max={new Date().toISOString().split("T")[0]} style={{...inputStyle,colorScheme:"light"}} />
          </div>
          <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="Password (min 6)" type="password" style={{...inputStyle, marginTop:12}} />
          <input value={confirmPassword} onChange={e=>setConfirmPassword(e.target.value)} placeholder="Confirm Password" type="password" style={{...inputStyle,marginTop:12,borderColor:confirmPassword&&password!==confirmPassword?COLORS.red:"#333"}} />
          <div onClick={()=>setAgreed(!agreed)} style={{display:"flex",alignItems:"flex-start",gap:10,marginTop:16,cursor:"pointer"}}>
            <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${agreed?COLORS.yellow:"#444"}`,background:agreed?COLORS.yellow:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
              {agreed&&<span style={{color:"#000",fontWeight:900,fontSize:13}}>✓</span>}
            </div>
            <div style={{color:COLORS.muted,fontSize:12,lineHeight:1.5}}>
              Main <span style={{color:COLORS.yellow,fontWeight:700}}>Terms of Service</span> aur <span style={{color:COLORS.yellow,fontWeight:700}}>Privacy Policy</span> se sehmat hoon
            </div>
          </div>
          {error&&<div style={{color:COLORS.red,fontSize:13,marginTop:8,textAlign:"center"}}>{error}</div>}
          <button onClick={createAccount} disabled={loading} style={{...btnStyle, marginTop:20, opacity:loading?0.7:1}}>
            {loading ? "Creating..." : "CREATE ACCOUNT →"}
          </button>
        </>}

        <div style={{ textAlign:"center", marginTop:16 }}>
          <span onClick={onBack} style={{ color:COLORS.muted, cursor:"pointer", fontSize:14 }}>← Back</span>
        </div>
      </div>
    </div>
  );
}

// ── Phone Login Screen ────────────────────────────────────────
function PhoneLoginScreen({ onBack, onSuccess, showToast }) {
  const [phone, setPhone] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);

  const login = async () => {
    if (!phone || !password) { showToast("Enter phone and password", COLORS.red); return; }
    setLoading(true);
    try {
      const phoneNum = phone.startsWith('+') ? phone : `+91${phone}`;
      const data = await api("/auth/phone-login", "POST", { phone: phoneNum, password });
      onSuccess(data.token);
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  return (
    <div style={{ minHeight:"100vh", background:COLORS.dark, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ background:"#ffffff", border:`1px solid ${COLORS.yellow}`, borderRadius:24, padding:32, width:"100%", maxWidth:400 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ fontSize:56, fontWeight:900, letterSpacing:8 }}><span style={{color:'#FFD600'}}>P</span><span style={{color:'#00C853'}}>O</span><span style={{color:'#FF1744'}}>S</span><span style={{color:'#29B6F6'}}>T</span></div>
          <div style={{ color:COLORS.muted, fontSize:14, marginTop:8 }}>Sign In with Phone</div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <div style={{ background:"#f5f5f5", border:"1px solid #ddd", borderRadius:12, padding:"12px 16px", color:"#111111", fontSize:15, minWidth:70, textAlign:"center" }}>+91</div>
          <input value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,''))} placeholder="Phone number" type="tel" maxLength={10} style={{...inputStyle, flex:1}} />
        </div>
        <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="Password" type="password" style={{...inputStyle, marginTop:12}} />
        <button onClick={login} disabled={loading} style={{...btnStyle, marginTop:20, opacity:loading?0.7:1}}>
          {loading ? "Logging in..." : "LOGIN →"}
        </button>
        <div style={{ textAlign:"center", marginTop:16 }}>
          <span onClick={onBack} style={{ color:COLORS.muted, cursor:"pointer", fontSize:14 }}>← Back</span>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function SplashScreen() {
  return (
    <div style={{minHeight:"100vh",background:"#ffffff",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" width="160" height="200">

}

function PostApp() {
  const [screen, setScreen] = useState("splash");
  const [token, setToken] = useState(()=>localStorage.getItem("token")||null);
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState("home");
  const [toast, setToast] = useState(null);
  const [newToken, setNewToken] = useState(null);

  const showToast = (msg, color=COLORS.yellow) => { setToast({msg,color}); setTimeout(()=>setToast(null),3000); };

  useEffect(()=>{
    const t = setTimeout(()=>{ setScreen(s => s==="splash" ? "login" : s); }, 2000);
    return ()=>clearTimeout(t);
  },[]);

  useEffect(()=>{
    if(token){ api("/auth/me","GET",null,token).then(u=>{setUser(u);setScreen("app");}).catch(()=>{localStorage.removeItem("token");setToken(null);setScreen("login");}); }
  },[token]);

  if(screen==="splash") return <SplashScreen />;

  const handleLogin = async(email,password)=>{ try{ const d=await api("/auth/login","POST",{email,password}); localStorage.setItem("token",d.token); setToken(d.token); }catch(e){showToast(e.message,COLORS.red);} };
  const handleEmailSuccess = (tok)=>{ setNewToken(tok); setScreen("account-created"); };
  const handlePhoneSuccess = (tok)=>{ setNewToken(tok); setScreen("account-created"); };
  const handleAccountCreatedDone = ()=>{ setScreen("profile-setup"); };
  const handleProfileSetupDone = ()=>{ localStorage.setItem("token",newToken); setToken(newToken); };
  const handleLogout = ()=>{ localStorage.removeItem("token"); setToken(null); setUser(null); setScreen("login"); };

  if(screen==="login") return <LoginScreen onLogin={handleLogin} onGoSignup={()=>setScreen("signup")} onGoPhone={()=>setScreen("phone-login")} onGoPhoneSignup={()=>setScreen("phone-signup")} toast={toast} />;
  if(screen==="signup") return <EmailSignupScreen onBack={()=>setScreen("login")} onSuccess={handleEmailSuccess} showToast={showToast} />;
  if(screen==="account-created") return <AccountCreatedScreen onContinue={handleAccountCreatedDone} />;
  if(screen==="profile-setup") return <ProfileSetupScreen token={newToken} onDone={handleProfileSetupDone} showToast={showToast} />;
  if(screen==="phone-signup") return <PhoneSignupScreen onBack={()=>setScreen("login")} onSuccess={handlePhoneSuccess} showToast={showToast} />;
  if(screen==="phone-login") return <PhoneLoginScreen onBack={()=>setScreen("login")} onSuccess={(tok)=>{localStorage.setItem("token",tok);setToken(tok);}} showToast={showToast} />;
  if(!user) return <div style={{minHeight:"100vh",background:"#000",display:"flex",alignItems:"center",justifyContent:"center",color:"#111111",fontSize:24}}>Loading...</div>;

  return (
    <div style={{minHeight:"100vh",background:COLORS.dark,color:COLORS.text,paddingBottom:80}}>
      <Toast toast={toast} />

// ── Profile Setup Screen ──────────────────────────────────────
function ProfileSetupScreen({ token, onDone, showToast }) {
  const [bio,setBio]=useState(""); const [photo,setPhoto]=useState(null); const [photoPreview,setPhotoPreview]=useState(null); const [loading,setLoading]=useState(false);
  const fileRef=useRef(null);
  const handlePhoto=(e)=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{ setPhotoPreview(ev.target.result); setPhoto(ev.target.result); };
    reader.readAsDataURL(file);
  };
  const handleSave=async()=>{
    setLoading(true);
    try{
      const body={about:bio};
      if(photo)body.avatar_photo=photo;
      await api("/profile","PATCH",body,token);
      onDone();
    }catch(e){ showToast(e.message,COLORS.red); }
    setLoading(false);
  };
  return (
    <div style={{minHeight:"100vh",background:COLORS.dark,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#ffffff",border:`1px solid ${COLORS.yellow}`,borderRadius:24,padding:32,width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:40,fontWeight:900,color:COLORS.yellow}}>Profile Setup 🎨</div>
          <div style={{color:COLORS.muted,fontSize:14,marginTop:8}}>Apna chehra dikhao duniya ko!</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:24}}>
          <div onClick={()=>fileRef.current.click()} style={{width:100,height:100,borderRadius:28,background:photoPreview?"transparent":COLORS.yellow,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",border:`2px dashed ${COLORS.yellow}`,position:"relative"}}>
            {photoPreview
              ? <img src={photoPreview} style={{width:"100%",height:"100%",objectFit:"cover"}} />
              : <div style={{textAlign:"center"}}><div style={{fontSize:32}}>📷</div><div style={{fontSize:11,color:"#000",fontWeight:700,marginTop:4}}>Tap to add</div></div>
            }
          </div>
          <input ref={fileRef} type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}} />
          <div style={{color:COLORS.muted,fontSize:12,marginTop:8}}>Camera ya Gallery se photo lo</div>
        </div>
        <textarea value={bio} onChange={e=>setBio(e.target.value)} placeholder="Bio (optional) — apne baare mein kuch batao..." style={{...inputStyle,height:90,resize:"none"}} maxLength={150} />
        <div style={{color:COLORS.muted,fontSize:11,textAlign:"right",marginTop:4}}>{bio.length}/150</div>
        <button onClick={handleSave} disabled={loading} style={{...btnStyle,marginTop:16,opacity:loading?0.7:1}}>
          {loading?"Saving...":"SAVE & CONTINUE →"}
        </button>
        <button onClick={onDone} style={{...btnStyle,background:"transparent",color:COLORS.muted,border:"none",marginTop:8,fontSize:13}}>
          Skip for now
        </button>
      </div>
    </div>
  );
}

function HomeTab({ token, user, showToast }) {
  const [posts, setPosts] = useState([]);
  const [showCompose, setShowCompose] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(() => { loadPosts(); }, []);

  const loadPosts = async () => {
    try {
      const d = await api("/posts", "GET", null, token);
      setPosts(d.posts || d);
      setLoading(false);
    } catch (e) {
      showToast(e.message, COLORS.red);
      setLoading(false);
    }
  };

  const handleLike = async (pid, color) => {
    try { await api(`/posts/${pid}/like`, "POST", { color }, token); loadPosts(); } catch (e) { showToast(e.message, COLORS.red); }
  };
  const handleDelete = async (pid) => {
    try { await api(`/posts/${pid}`, "DELETE", null, token); showToast("Post deleted", COLORS.red); loadPosts(); } catch (e) { showToast(e.message, COLORS.red); }
  };
  const handleComment = async (pid, text) => {
    try { await api(`/posts/${pid}/comments`, "POST", { text }, token); loadPosts(); } catch (e) { showToast(e.message, COLORS.red); }
  };

  if (loading) {
    return <div style={{ textAlign: "center", padding: 40, color: COLORS.muted }}>Loading posts... ⏳</div>;
  }

  return (
    <div style={{ maxWidth: "1200px", margin: "0 auto", padding: "16px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "24px", paddingTop: "8px" }}>
        <div>
          <h2 style={{ fontSize: "24px", fontWeight: "900", marginBottom: "4px" }}>Feed 🌍</h2>
          <p style={{ color: COLORS.muted, fontSize: "13px" }}>{posts.length} posts from your network</p>
        </div>
        <button
          onClick={() => setShowCompose(true)}
          style={{ background: COLORS.yellow, color: "#000", border: "none", borderRadius: "14px", padding: "12px 20px", fontWeight: "900", fontSize: "14px", cursor: "pointer", display: "flex", alignItems: "center", gap: "8px" }}
        >
          ✦ New Post
        </button>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: "16px" }}>
        {posts.length === 0 ? (
          <div style={{ gridColumn: "1 / -1", textAlign: "center", padding: "60px 20px", color: COLORS.muted }}>
            <div style={{ fontSize: "48px", marginBottom: "16px" }}>🚀</div>
            <p>No posts yet. Be the first to post!</p>
          </div>
        ) : (
          posts.map((post, idx) => (
            <BentoPostCard key={post.id} post={post} user={user} onLike={handleLike} onDelete={handleDelete} onComment={handleComment} isLarge={idx % 5 === 0} />
          ))
        )}
      </div>

      {showCompose && (
        <ComposeModal token={token} user={user} onClose={() => setShowCompose(false)} onPost={() => { setShowCompose(false); loadPosts(); showToast("Posted! 🌍", COLORS.green); }} showToast={showToast} />
      )}
    </div>
  );
}

function BentoPostCard({ post, user, onLike, onDelete, onComment, isLarge }) {
  const [showComments, setShowComments] = useState(false);
  const [commentText, setCommentText] = useState("");
  const myLike = post.likes?.find(l => l.user_id === user.id);

  return (
    <div style={{ background: COLORS.card, border: `2px solid ${post.accent || COLORS.yellow}`, borderRadius: "20px", padding: "20px", display: "flex", flexDirection: "column", gap: "12px", transition: "transform 0.2s", gridColumn: isLarge ? "span 2" : "span 1", position: "relative", overflow: "hidden" }}
      onMouseEnter={e => e.currentTarget.style.transform = "translateY(-4px)"}
      onMouseLeave={e => e.currentTarget.style.transform = "translateY(0)"}
    >
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start" }}>
        <div style={{ display: "flex", gap: "12px", alignItems: "start", flex: 1 }}>
          <div style={{ width: "44px", height: "44px", borderRadius: "14px", background: post.avatar_bg || COLORS.yellow, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: "900", fontSize: "20px", flexShrink: 0, overflow: "hidden" }}>
            {post.avatar_photo ? <img src={post.avatar_photo} style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : post.avatar_letter}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontWeight: "700", fontSize: "14px" }}>{post.user_name}</div>
            <div style={{ color: COLORS.muted, fontSize: "12px" }}>{post.user_handle}</div>
            {post.location && <div style={{ color: COLORS.muted, fontSize: "11px", marginTop: "4px" }}>📍 {post.location}</div>}
          </div>
        </div>
        {post.user_id === user.id && (
          <button onClick={() => onDelete(post.id)} style={{ color: COLORS.red, background: "none", border: "none", cursor: "pointer", fontSize: "18px", padding: "4px" }}>🗑</button>
        )}
      </div>

      <div style={{ fontSize: isLarge ? "16px" : "14px", lineHeight: "1.6", color: COLORS.text, flexGrow: 1 }}>{post.content}</div>

      <div style={{ height: "4px", background: post.accent || COLORS.yellow, borderRadius: "2px", width: "40px" }} />

      <div style={{ display: "flex", justifyContent: "space-between", fontSize: "12px", color: COLORS.muted }}>
        <span>{post.likes?.length || 0} likes</span>
        <span>{post.comments?.length || 0} comments</span>
      </div>

      <div style={{ display: "flex", gap: "8px", borderTop: "1px solid #e0e0e0", paddingTop: "12px", justifyContent: "space-around" }}>
        <div style={{ display: "flex", gap: "4px" }}>
          {ACCENTS.map(c => (
            <button key={c} onClick={() => onLike(post.id, c)} style={{ width: "24px", height: "24px", borderRadius: "50%", background: c, border: myLike?.color === c ? `2px solid ${COLORS.text}` : "2px solid transparent", cursor: "pointer" }} />
          ))}
        </div>
        <button onClick={() => setShowComments(!showComments)} style={{ background: "none", border: "none", color: COLORS.muted, cursor: "pointer", fontSize: "13px", display: "flex", alignItems: "center", gap: "4px" }}>
          💬 Comment
        </button>
      </div>

      {showComments && (
        <div style={{ borderTop: "1px solid #e0e0e0", paddingTop: "12px" }}>
          <div style={{ maxHeight: "200px", overflowY: "auto", marginBottom: "8px" }}>
            {post.comments?.map((c, i) => (
              <div key={i} style={{ fontSize: "12px", padding: "6px 0", borderBottom: "1px solid #1a1a1a" }}>
                <span style={{ fontWeight: "700", color: COLORS.yellow }}>{c.user_name}: </span>
                <span style={{ color: "#ccc" }}>{c.text}</span>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: "6px" }}>
            <input value={commentText} onChange={e => setCommentText(e.target.value)} placeholder="Comment..." style={{ ...inputStyle, flex: 1, padding: "6px 10px", fontSize: "12px" }}
              onKeyDown={e => { if (e.key === "Enter" && commentText.trim()) { onComment(post.id, commentText); setCommentText(""); } }} />
            <button onClick={() => { if (commentText.trim()) { onComment(post.id, commentText); setCommentText(""); } }} style={{ background: COLORS.yellow, color: "#000", border: "none", borderRadius: "6px", padding: "6px 10px", fontWeight: "700", cursor: "pointer", fontSize: "12px" }}>→</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ComposeModal({ token, user, onClose, onPost, showToast }) {
  const [text, setText] = useState("");
  const [accent, setAccent] = useState(COLORS.yellow);
  const [location, setLocation] = useState("");
  const [loading, setLoading] = useState(false);

  const handlePost = async () => {
    if (!text.trim()) { showToast("Write something!", COLORS.red); return; }
    setLoading(true);
    try { await api("/posts", "POST", { content: text, accent, location }, token); onPost(); }
    catch (e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.95)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: "16px", backdropFilter: "blur(4px)" }} onClick={onClose}>
      <div style={{ background: COLORS.card, borderRadius: "24px", padding: "24px", width: "100%", maxWidth: "500px", border: `2px solid ${accent}` }} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
          <span style={{ fontWeight: "900", fontSize: "16px", display:"flex", alignItems:"center", gap:8 }}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> New Post</span>
          <button onClick={onClose} style={{ color: COLORS.muted, background: "none", border: "none", cursor: "pointer", fontSize: "24px" }}>✕</button>
        </div>

        {user && (
          <div style={{ display: "flex", gap: "12px", marginBottom: "12px" }}>
            <div style={{ width: "44px", height: "44px", borderRadius: "14px", background: user.avatar_bg || COLORS.yellow, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: "900", fontSize: "20px", overflow: "hidden" }}>
              {user.avatar_photo ? <img src={user.avatar_photo} style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : user.avatar_letter}
            </div>
            <div>
              <div style={{ fontWeight: "700" }}>{user.name}</div>
              <div style={{ color: COLORS.muted, fontSize: "12px" }}>{user.handle}</div>
            </div>
          </div>
        )}

        <textarea value={text} onChange={e => setText(e.target.value)} placeholder="What's on your mind? 🌍" style={{ ...inputStyle, height: "120px", resize: "none", marginBottom: "12px" }} />
        <input value={location} onChange={e => setLocation(e.target.value)} placeholder="📍 Location (optional)" style={{ ...inputStyle, marginBottom: "12px", fontSize: "13px" }} />

        <div style={{ marginBottom: "14px" }}>
          <div style={{ fontSize: "11px", color: COLORS.muted, marginBottom: "8px", fontWeight: "600", letterSpacing: 1 }}>POST COLOUR</div>
          <div style={{ display: "flex", gap: "12px" }}>
          {ACCENTS.map(c => (
            <button key={c} onClick={() => setAccent(c)} style={{ width: "42px", height: "42px", borderRadius: "50%", background: c, border: accent === c ? `3px solid #111` : "3px solid transparent", cursor: "pointer", display:"flex", alignItems:"center", justifyContent:"center", transform: accent === c ? "scale(1.18)" : "scale(1)", transition: "all 0.2s", boxShadow: accent === c ? `0 0 0 3px ${c}55, 0 4px 12px ${c}66` : "none" }}>
              {accent === c && <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
            </button>
          ))}
          </div>
        </div>

        <button onClick={handlePost} disabled={loading} style={{ ...btnStyle, opacity: loading ? 0.7 : 1 }}>
          {loading ? "Posting..." : "SHARE GLOBALLY 🌍"}
        </button>
      </div>
    </div>
  );
}

function DiscoverTab({ token, user, showToast }) {
  const [users,setUsers]=useState([]); const [q,setQ]=useState(""); const [loading,setLoading]=useState(true);
  useEffect(()=>{ api(`/users${q?`?q=${q}`:""}`, "GET",null,token).then(d=>setUsers(d.users||d)).catch(()=>{}).finally(()=>setLoading(false)); },[q]);
  const sendRequest=async(uid)=>{ try{await api("/friends/request","POST",{target_user_id:uid},token);showToast("Request sent! 🤝",COLORS.green);}catch(e){showToast(e.message,COLORS.red);} };
  return (
    <div style={{maxWidth:600,margin:"0 auto",padding:16}}>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Search people..." style={{...inputStyle,marginBottom:16}} />
      {loading&&<div style={{textAlign:"center",color:COLORS.muted,padding:40}}>Loading...</div>}
      {users.map(u=>(
        <div key={u.id} style={{background:COLORS.card,border:"1px solid #e0e0e0",borderRadius:16,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:44,height:44,borderRadius:14,background:u.avatar_bg||COLORS.yellow,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:20,flexShrink:0,overflow:"hidden"}}>
            {u.avatar_photo?<img src={u.avatar_photo} style={{width:"100%",height:"100%",objectFit:"cover"}} />:u.avatar_letter}
          </div>
          <div style={{flex:1}}><div style={{fontWeight:700}}>{u.name}</div><div style={{color:COLORS.muted,fontSize:12}}>{u.handle}{u.location?` • ${u.location}`:""}</div></div>
          <button onClick={()=>sendRequest(u.id)} style={{background:COLORS.yellow,color:"#000",border:"none",borderRadius:10,padding:"8px 14px",fontWeight:700,cursor:"pointer",fontSize:13}}>Connect</button>
        </div>
      ))}
    </div>
  );
}

function FriendsTab({ token, user, showToast }) {
  const [data,setData]=useState({friends:[],pending_incoming:[],pending_outgoing:[]});
  const load=async()=>{ try{const d=await api("/friends","GET",null,token);setData(d);}catch(e){} };
  useEffect(()=>{load();},[]);
  const accept=async(uid)=>{ await api("/friends/accept","POST",{target_user_id:uid},token);showToast("Friends now! 🎉",COLORS.green);load(); };
  const decline=async(uid)=>{ await api("/friends/decline","POST",{target_user_id:uid},token);load(); };
  return (
    <div style={{maxWidth:600,margin:"0 auto",padding:16}}>
      {data.pending_incoming.length>0&&<>
        <div style={{fontWeight:700,color:COLORS.yellow,marginBottom:10,fontSize:13,letterSpacing:2}}>REQUESTS 📬</div>
        {data.pending_incoming.map(r=>(
          <div key={r.id} style={{background:COLORS.card,border:"1px solid #ddd",borderRadius:14,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1,fontWeight:600,fontSize:14}}>{r.from_id}</div>
            <button onClick={()=>accept(r.from_id)} style={{background:COLORS.green,color:"#000",border:"none",borderRadius:8,padding:"6px 12px",fontWeight:700,cursor:"pointer",fontSize:12,marginRight:6}}>Accept</button>
            <button onClick={()=>decline(r.from_id)} style={{background:"#e0e0e0",color:"#111111",border:"none",borderRadius:8,padding:"6px 12px",fontWeight:700,cursor:"pointer",fontSize:12}}>Decline</button>
          </div>
        ))}
      </>}
      <div style={{fontWeight:700,color:COLORS.yellow,marginBottom:10,marginTop:16,fontSize:13,letterSpacing:2}}>FRIENDS 🤝</div>
      {data.friends.length===0&&<div style={{color:COLORS.muted,textAlign:"center",padding:30}}>No friends yet. Start discovering! 🔍</div>}
      {data.friends.map(f=>(
        <div key={f.id} style={{background:COLORS.card,border:"1px solid #e0e0e0",borderRadius:14,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:40,height:40,borderRadius:12,background:f.avatar_bg||COLORS.yellow,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:18,overflow:"hidden"}}>
            {f.avatar_photo?<img src={f.avatar_photo} style={{width:"100%",height:"100%",objectFit:"cover"}} />:f.avatar_letter}
          </div>
          <div><div style={{fontWeight:700}}>{f.name}</div><div style={{color:COLORS.muted,fontSize:12}}>{f.handle}</div></div>
        </div>
      ))}
    </div>
  );
}

function MessagesTab({ token, user, showToast }) {
  const [friends,setFriends]=useState([]); const [selected,setSelected]=useState(null); const [messages,setMessages]=useState([]); const [text,setText]=useState(""); const msgEnd=useRef(null);
  useEffect(()=>{api("/friends","GET",null,token).then(d=>setFriends(d.friends)).catch(()=>{});},[]);
  useEffect(()=>{
    if(!selected)return;
    const load=()=>api(`/messages?with_user=${selected.id}`,"GET",null,token).then(setMessages).catch(()=>{});
    load(); const iv=setInterval(load,5000); return()=>clearInterval(iv);
  },[selected]);
  useEffect(()=>msgEnd.current?.scrollIntoView({behavior:"smooth"}),[messages]);
  const sendMsg=async()=>{
    if(!text.trim()||!selected)return;
    try{await api("/messages","POST",{to_user_id:selected.id,text},token);setText("");const d=await api(`/messages?with_user=${selected.id}`,"GET",null,token);setMessages(d);}catch(e){showToast(e.message,COLORS.red);}
  };
  if(selected) return (
    <div style={{maxWidth:600,margin:"0 auto",display:"flex",flexDirection:"column",height:"calc(100vh - 130px)"}}>
      <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid #e0e0e0"}}>
        <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",color:COLORS.yellow,cursor:"pointer",fontSize:20}}>←</button>
        <div style={{width:36,height:36,borderRadius:10,background:selected.avatar_bg,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>{selected.avatar_letter}</div>
        <div style={{fontWeight:700}}>{selected.name}</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:16}}>
        {messages.map(m=>(
          <div key={m.id} style={{marginBottom:10,display:"flex",flexDirection:m.from_id===user.id?"row-reverse":"row",gap:8}}>
            <div style={{background:m.from_id===user.id?COLORS.yellow:"#222",color:m.from_id===user.id?"#000":"#fff",borderRadius:14,padding:"8px 14px",maxWidth:"75%",fontSize:14}}>{m.text}</div>
          </div>
        ))}
        <div ref={msgEnd} />
      </div>
      <div style={{padding:"10px 16px",borderTop:"1px solid #e0e0e0",display:"flex",gap:10}}>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMsg()} placeholder="Message..." style={{...inputStyle,flex:1}} />
        <button onClick={sendMsg} style={{background:COLORS.yellow,color:"#000",border:"none",borderRadius:12,padding:"10px 18px",fontWeight:700,cursor:"pointer"}}>→</button>
      </div>
    </div>
  );
  return (
    <div style={{maxWidth:600,margin:"0 auto",padding:16}}>
      <div style={{fontWeight:700,color:COLORS.yellow,marginBottom:12,fontSize:13,letterSpacing:2}}>MESSAGES 💬</div>
      {friends.length===0&&<div style={{color:COLORS.muted,textAlign:"center",padding:40}}>Add friends to start chatting!</div>}
      {friends.map(f=>(
        <div key={f.id} onClick={()=>setSelected(f)} style={{background:COLORS.card,border:"1px solid #e0e0e0",borderRadius:16,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
          <div style={{width:44,height:44,borderRadius:14,background:f.avatar_bg||COLORS.yellow,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:20}}>{f.avatar_letter}</div>
          <div><div style={{fontWeight:700}}>{f.name}</div><div style={{color:COLORS.muted,fontSize:12}}>{f.handle}</div></div>
        </div>
      ))}
    </div>
  );
}

function ProfileTab({ token, user, setUser, showToast }) {
  const [editing,setEditing]=useState(false); const [name,setName]=useState(user.name||""); const [location,setLocation]=useState(user.location||""); const [about,setAbout]=useState(user.about||""); const [avatarBg,setAvatarBg]=useState(user.avatar_bg||COLORS.yellow);
  const save=async()=>{ try{const u=await api("/profile","PATCH",{name,location,about,avatar_bg:avatarBg},token);setUser(u);setEditing(false);showToast("Profile updated! ✓",COLORS.green);}catch(e){showToast(e.message,COLORS.red);} };
  return (
    <div style={{maxWidth:600,margin:"0 auto",padding:16}}>
      <div style={{background:COLORS.card,border:"1px solid #e0e0e0",borderRadius:20,padding:24,textAlign:"center"}}>
        <div style={{width:80,height:80,borderRadius:24,background:user.avatar_bg||COLORS.yellow,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:36,margin:"0 auto 16px",overflow:"hidden"}}>
          {user.avatar_photo?<img src={user.avatar_photo} style={{width:"100%",height:"100%",objectFit:"cover"}} />:user.avatar_letter}
        </div>
        <div style={{fontWeight:900,fontSize:22}}>{user.name}</div>
        <div style={{color:COLORS.muted,fontSize:14,marginTop:4}}>{user.handle}</div>
        {user.location&&<div style={{color:COLORS.muted,fontSize:13,marginTop:4}}>📍 {user.location}</div>}
        {user.about&&<div style={{color:"#ccc",fontSize:14,marginTop:10,lineHeight:1.5}}>{user.about}</div>}
        {!editing?(
          <button onClick={()=>setEditing(true)} style={{...btnStyle,marginTop:20,maxWidth:200,margin:"20px auto 0"}}>Edit Profile ✏️</button>
        ):(
          <div style={{marginTop:20,textAlign:"left"}}>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Name" style={{...inputStyle,marginBottom:10}} />
            <input value={location} onChange={e=>setLocation(e.target.value)} placeholder="Location" style={{...inputStyle,marginBottom:10}} />
            <textarea value={about} onChange={e=>setAbout(e.target.value)} placeholder="About yourself..." style={{...inputStyle,height:80,resize:"none",marginBottom:10}} />
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {ACCENTS.map(c=><button key={c} onClick={()=>setAvatarBg(c)} style={{width:36,height:36,borderRadius:10,background:c,border:avatarBg===c?"3px solid white":"3px solid transparent",cursor:"pointer"}} />)}
            </div>
            <button onClick={save} style={btnStyle}>Save ✓</button>
            <button onClick={()=>setEditing(false)} style={{...btnStyle,background:"#e0e0e0",color:"#111111",marginTop:8}}>Cancel</button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PostApp />);
</script>
</body>
</html>
