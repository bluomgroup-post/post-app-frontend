<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>POST App</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
input, textarea, button { font-family: inherit; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API = "https://post-app-backend-dqtp.onrender.com/api";
const COLORS = {
  yellow: "#FFD600", green: "#00C853", red: "#FF1744", blue: "#2979FF",
  dark: "#0A0A0A", card: "#111111", text: "#FFFFFF", muted: "#666666",
};
const ACCENTS = [COLORS.yellow, COLORS.green, COLORS.red, COLORS.blue];

async function api(path, method = "GET", body = null, token = null) {
  const headers = { "Content-Type": "application/json" };
  if (token) headers["Authorization"] = `Bearer ${token}`;
  const res = await fetch(`\( {API} \){path}`, { method, headers, body: body ? JSON.stringify(body) : null });
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || "Something went wrong");
  return data;
}

const inputStyle = { width:"100%", background:"#0a0a0a", border:"1px solid #333", borderRadius:12, padding:"12px 16px", color:"#fff", fontSize:15, outline:"none", boxSizing:"border-box" };
const btnStyle = { width:"100%", padding:"14px", background:COLORS.yellow, color:"#000", fontWeight:900, fontSize:15, border:"none", borderRadius:14, cursor:"pointer", letterSpacing:1 };

function Toast({ toast }) {
  if (!toast) return null;
  return <div style={{ position:"fixed", top:24, left:"50%", transform:"translateX(-50%)", background:"#1a1a1a", border:`1px solid ${toast.color}`, color:toast.color, padding:"12px 24px", borderRadius:16, zIndex:9999, fontWeight:700, fontSize:14, whiteSpace:"nowrap" }}>{toast.msg}</div>;
}

// Phone Signup (Existing)
function PhoneSignupScreen({ onBack, onSuccess, showToast }) {
  const [step, setStep] = useState("phone");
  const [phone, setPhone] = useState("");
  const [otp, setOtp] = useState("");
  const [name, setName] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [demoOtp, setDemoOtp] = useState(null);

  const sendOtp = async () => {
    if (!phone || phone.length < 10) { showToast("Enter valid phone", COLORS.red); return; }
    setLoading(true);
    try {
      const phoneNum = phone.startsWith('+') ? phone : `+91${phone}`;
      const data = await api("/auth/phone-signup-init", "POST", { phone: phoneNum });
      if (data.demo_otp) setDemoOtp(data.demo_otp);
      setStep("otp");
      showToast("OTP sent!", COLORS.green);
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  const verifyOtp = async () => {
    if (!otp || otp.length < 4) { showToast("Enter OTP", COLORS.red); return; }
    setLoading(true);
    try {
      const phoneNum = phone.startsWith('+') ? phone : `+91${phone}`;
      await api("/auth/phone-verify-init", "POST", { phone: phoneNum, otp });
      setStep("details");
      showToast("Phone verified!", COLORS.green);
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  const createAccount = async () => {
    if (!name.trim() || password.length < 6) { showToast("Enter name and password", COLORS.red); return; }
    setLoading(true);
    try {
      const phoneNum = phone.startsWith('+') ? phone : `+91${phone}`;
      const data = await api("/auth/phone-signup", "POST", { phone: phoneNum, name, password });
      onSuccess(data.token);
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  return (
    <div style={{ minHeight:"100vh", background:COLORS.dark, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ background:"#111", border:`1px solid ${COLORS.yellow}`, borderRadius:24, padding:32, width:"100%", maxWidth:400 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ fontSize:56, fontWeight:900, color:COLORS.yellow, letterSpacing:8 }}>POST</div>
        </div>
        {step==="phone" && <>
          <div style={{ display:"flex", gap:8 }}>
            <div style={{ background:"#1a1a1a", border:"1px solid #333", borderRadius:12, padding:"12px 16px", minWidth:70, textAlign:"center" }}>+91</div>
            <input value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,''))} placeholder="Phone number" type="tel" maxLength={10} style={{...inputStyle, flex:1}} />
          </div>
          <button onClick={sendOtp} disabled={loading} style={{...btnStyle, marginTop:20}}>{loading ? "Sending..." : "SEND OTP →"}</button>
        </>}
        {step==="otp" && <>
          <input value={otp} onChange={e=>setOtp(e.target.value.replace(/\D/g,''))} placeholder="4-digit OTP" maxLength={6} style={{...inputStyle, textAlign:"center", fontSize:24}} />
          <button onClick={verifyOtp} disabled={loading} style={{...btnStyle, marginTop:20}}>{loading ? "Verifying..." : "VERIFY →"}</button>
        </>}
        {step==="details" && <>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" style={inputStyle} />
          <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="Password" type="password" style={{...inputStyle, marginTop:12}} />
          <button onClick={createAccount} disabled={loading} style={{...btnStyle, marginTop:20}}>{loading ? "Creating..." : "CREATE ACCOUNT →"}</button>
        </>}
        <div style={{ textAlign:"center", marginTop:16 }}>
          <span onClick={onBack} style={{ color:COLORS.muted, cursor:"pointer" }}>← Back</span>
        </div>
      </div>
    </div>
  );
}

// LoginScreen, SplashScreen etc. same (space saving ke liye yahan nahi likh raha, purana code rakh sakte ho)

function PostApp() {
  const [screen, setScreen] = useState("splash");
  const [token, setToken] = useState(()=>localStorage.getItem("token")||null);
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState("home");
  const [toast, setToast] = useState(null);
  const [pendingEmail, setPendingEmail] = useState("");
  const [demoOtp, setDemoOtp] = useState(null);

  const showToast = (msg, color=COLORS.yellow) => { setToast({msg,color}); setTimeout(()=>setToast(null),3000); };

  useEffect(()=>{ const t = setTimeout(()=>{ setScreen(s => s==="splash" ? "login" : s); }, 2000); return ()=>clearTimeout(t); },[]);

  useEffect(()=>{ if(token){ api("/auth/me","GET",null,token).then(u=>{setUser(u);setScreen("app");}).catch(()=>{localStorage.removeItem("token");setToken(null);setScreen("login");}); } },[token]);

  const handleSignup = async(name, username, email, password) => {
    try {
      const d = await api("/auth/signup","POST",{name, username, email, password});
      setPendingEmail(email);
      if(d.demo_otp) setDemoOtp(d.demo_otp);
      setScreen("otp");
      showToast("OTP sent to email", COLORS.green);
    } catch(e) { showToast(e.message, COLORS.red); }
  };

  const handleVerifyOtp = async(otp) => {
    try {
      const d = await api("/auth/verify-otp","POST",{email:pendingEmail,otp});
      localStorage.setItem("token", d.token);
      setToken(d.token);
      setScreen("profile-setup");
    } catch(e) { showToast(e.message, COLORS.red); }
  };

  if(screen==="splash") return <SplashScreen />;
  if(screen==="login") return <LoginScreen onLogin={()=>{}} onGoSignup={()=>setScreen("signup")} onGoPhone={()=>{}} onGoPhoneSignup={()=>setScreen("phone-signup")} toast={toast} />;
  if(screen==="signup") return <SignupScreen onSignup={handleSignup} onGoLogin={()=>setScreen("login")} toast={showToast} />;
  if(screen==="otp") return <OtpScreen onVerify={handleVerifyOtp} email={pendingEmail} demoOtp={demoOtp} toast={toast} />;
  if(screen==="profile-setup") return <ProfileSetupScreen token={token} onComplete={()=>setScreen("success")} showToast={showToast} />;
  if(screen==="success") return <SuccessScreen onContinue={() => window.location.reload()} />;

  // Baaki app code (Home, Discover etc.) same rakh sakte ho
  return <div>Loading Final App...</div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<PostApp />);
</script>
</body>
</html>
