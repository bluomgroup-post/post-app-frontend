// ── Auto-Translation (POST's own — no Google dependency) ───────
const _translateCache = {};
const LANG_MAP = { en:"en", hi:"hi", ur:"ur", es:"es", fr:"fr", ar:"ar", pt:"pt", de:"de", zh:"zh-CN", ja:"ja", ru:"ru", bn:"bn", id:"id", tr:"tr" };
async function translateText(text, targetLang) {
  if (!text || !text.trim()) return text;
  const tl = LANG_MAP[targetLang] || targetLang;
  if (tl === "en") return text; // no need to translate to/from same lang
  const key = tl + "||" + text;
  if (_translateCache[key]) return _translateCache[key];
  try {
    const res = await fetch(`${API}/translate`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, target: tl }),
    });
    const data = await res.json();
    const translated = data.translated || text;
    _translateCache[key] = translated;
    return translated;
  } catch(e) {
    return text; // fallback: show original
  }
}

async function api(path, method = "GET", body = null, token = null) {
  const headers = { "Content-Type": "application/json" };
  if (token) headers["Authorization"] = `Bearer ${token}`;
  const res = await fetch(`${API}${path}`, { method, headers, body: body ? JSON.stringify(body) : null });
  const data = await res.json();
  if (!res.ok) {
    const err = new Error(typeof data.detail === "object" ? (data.detail.message || "Verification required") : (data.detail || "Something went wrong"));
    if (res.status === 403 && typeof data.detail === "object" && data.detail.code === "SECONDARY_REQUIRED") {
      err.secondaryRequired = data.detail.type;
    }
    throw err;
  }
  return data;
}

function Toast({ toast }) {
  if (!toast) return null;
  return <div style={{ position:"fixed", top:24, left:"50%", transform:"translateX(-50%)", background:"var(--card-bg)", border:`1px solid ${toast.color}`, color:toast.color, padding:"12px 24px", borderRadius:16, zIndex:9999, fontWeight:700, fontSize:14, whiteSpace:"nowrap", boxShadow:"0 4px 20px var(--shadow)" }}>{toast.msg}</div>;
}

function PhoneSignupScreen({ onBack, onSuccess, showToast }) {
  const [step, setStep] = useState("phone"); // phone | otp | details
  const [phone, setPhone] = useState("");
  const [otp, setOtp] = useState("");
  const [name, setName] = useState("");
  const [username, setUsername] = useState("");
  const [dob, setDob] = useState("");
  const [password, setPassword] = useState("");
  const [confirmPassword, setConfirmPassword] = useState("");
  const [agreed, setAgreed] = useState(false);
  const [loading, setLoading] = useState(false);
  const [demoOtp, setDemoOtp] = useState(null);
  const [error, setError] = useState("");

  const calcAge=(d)=>{ const b=new Date(d); const t=new Date(); let age=t.getFullYear()-b.getFullYear(); const m=t.getMonth()-b.getMonth(); if(m<0||(m===0&&t.getDate()<b.getDate()))age--; return age; };

  const sendOtp = async () => {
    if (!phone || phone.length < 10) { showToast("Enter a valid phone number", COLORS.red); return; }
    setLoading(true);
    try {
      const phoneNum = phone.startsWith('+') ? phone : `+91${phone}`;
      const data = await api("/auth/phone-signup-init", "POST", { phone: phoneNum });
      if (data.demo_otp) setDemoOtp(data.demo_otp);
      setStep("otp");
      showToast("OTP sent! 📱", COLORS.green);
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  const verifyOtp = async () => {
    if (!otp || otp.length < 4) { showToast("Enter OTP", COLORS.red); return; }
    setLoading(true);
    try {
      const phoneNum = phone.startsWith('+') ? phone : `+91${phone}`;
      await api("/auth/phone-verify-init", "POST", { phone: phoneNum, otp });
      setStep("details");
      showToast("Phone verified! ✅", COLORS.green);
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  const createAccount = async () => {
    if(!name.trim()||!username.trim()||!dob||password.length<6){setError("Name, username, DOB aur password (min 6) required");return;}
    if(!/^[a-z0-9_]+$/.test(username)){setError("Username: sirf lowercase, numbers, underscore");return;}
    if(calcAge(dob)<13){setError("Account banane ke liye 13 saal ka hona zaroori hai");return;}
    if(password!==confirmPassword){setError("Passwords match nahi kar rahe ❌");return;}
    if(!agreed){setError("Terms of Service aur Privacy Policy accept karo");return;}
    setError("");
    setLoading(true);
    try {
      const phoneNum = phone.startsWith('+') ? phone : `+91${phone}`;
      const data = await api("/auth/phone-signup", "POST", { phone: phoneNum, name, username, password, dob });
      onSuccess(data.token, data.requires_email);
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  return (
    <div style={{ minHeight:"100vh", background:COLORS.dark, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ background:"#ffffff", border:`1px solid ${COLORS.yellow}`, borderRadius:24, padding:32, width:"100%", maxWidth:400 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ fontSize:56, fontWeight:900, letterSpacing:8 }}><span style={{color:'#FFD600'}}>P</span><span style={{color:'#00C853'}}>O</span><span style={{color:'#FF1744'}}>S</span><span style={{color:'#29B6F6'}}>T</span></div>
          <div style={{ color:COLORS.muted, fontSize:14, marginTop:8 }}>
            {step==="phone" ? "Join the world 🌐" : step==="otp" ? "Verify OTP" : "Create Account"}
          </div>
        </div>

        {step==="phone" && <>
          <div style={{ display:"flex", gap:8 }}>
            <div style={{ background:"#f5f5f5", border:"1px solid #ddd", borderRadius:12, padding:"12px 16px", color:"#111111", fontSize:15, minWidth:70, textAlign:"center" }}>+91</div>
            <input value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,''))} placeholder="Phone number" type="tel" maxLength={10} style={{...inputStyle, flex:1}} />
          </div>
          <button onClick={sendOtp} disabled={loading} style={{...btnStyle, marginTop:20, opacity:loading?0.7:1}}>
            {loading ? "Sending..." : "SEND OTP →"}
          </button>
        </>}

        {step==="otp" && <>
          <div style={{ color:COLORS.muted, fontSize:13, marginBottom:16, textAlign:"center" }}>
            OTP sent to: {phone.startsWith('+')?phone:`+91${phone}`}
          </div>
          {demoOtp && <div style={{ background:"#0a1a0a", border:`1px solid ${COLORS.green}`, borderRadius:12, padding:"12px 16px", color:COLORS.green, fontWeight:900, fontSize:22, letterSpacing:6, textAlign:"center", marginBottom:16 }}>{demoOtp}</div>}
          <input value={otp} onChange={e=>setOtp(e.target.value.replace(/\D/g,''))} placeholder="4-digit OTP" maxLength={6} style={{...inputStyle, textAlign:"center", fontSize:24, letterSpacing:8}} />
          <button onClick={verifyOtp} disabled={loading} style={{...btnStyle, marginTop:20, opacity:loading?0.7:1}}>
            {loading ? "Verifying..." : "VERIFY →"}
          </button>
        </>}

        {step==="details" && <>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" style={inputStyle} />
          <div style={{position:"relative",marginTop:12}}>
            <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:COLORS.muted,fontSize:15}}>@</span>
            <input value={username} onChange={e=>setUsername(e.target.value.toLowerCase().replace(/[^a-z0-9_]/g,""))} placeholder="username" style={{...inputStyle,paddingLeft:30}} />
          </div>
          <div style={{marginTop:12}}>
            <div style={{color:COLORS.muted,fontSize:12,marginBottom:6}}>Date of Birth</div>
            <input value={dob} onChange={e=>setDob(e.target.value)} type="date" max={new Date().toISOString().split("T")[0]} style={{...inputStyle,colorScheme:"light"}} />
          </div>
          <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="Password (min 6)" type="password" style={{...inputStyle, marginTop:12}} />
          <input value={confirmPassword} onChange={e=>setConfirmPassword(e.target.value)} placeholder="Confirm Password" type="password" style={{...inputStyle,marginTop:12,borderColor:confirmPassword&&password!==confirmPassword?COLORS.red:"#333"}} />
          <div onClick={()=>setAgreed(!agreed)} style={{display:"flex",alignItems:"flex-start",gap:10,marginTop:16,cursor:"pointer"}}>
            <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${agreed?COLORS.yellow:"#444"}`,background:agreed?COLORS.yellow:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
              {agreed&&<span style={{color:"#000",fontWeight:900,fontSize:13}}>✓</span>}
            </div>
            <div style={{color:COLORS.muted,fontSize:12,lineHeight:1.5}}>
              Main <span style={{color:COLORS.yellow,fontWeight:700}}>Terms of Service</span> aur <span style={{color:COLORS.yellow,fontWeight:700}}>Privacy Policy</span> se sehmat hoon
            </div>
          </div>
          {error&&<div style={{color:COLORS.red,fontSize:13,marginTop:8,textAlign:"center"}}>{error}</div>}
          <button onClick={createAccount} disabled={loading} style={{...btnStyle, marginTop:20, opacity:loading?0.7:1}}>
            {loading ? "Creating..." : "CREATE ACCOUNT →"}
          </button>
        </>}

        <div style={{ textAlign:"center", marginTop:16 }}>
          <span onClick={onBack} style={{ color:COLORS.muted, cursor:"pointer", fontSize:14 }}>← Back</span>
        </div>
      </div>
    </div>
  );
}

function EmailSignupScreen({ onBack, onSuccess, showToast }) {
  const [step, setStep] = useState("email"); // email | otp | details
  const [email, setEmail] = useState("");
  const [otp, setOtp] = useState("");
  const [name, setName] = useState("");
  const [username, setUsername] = useState("");
  const [dob, setDob] = useState("");
  const [password, setPassword] = useState("");
  const [confirmPassword, setConfirmPassword] = useState("");
  const [agreed, setAgreed] = useState(false);
  const [loading, setLoading] = useState(false);
  const [demoOtp, setDemoOtp] = useState(null);
  const [error, setError] = useState("");

  const calcAge=(d)=>{ const b=new Date(d); const t=new Date(); let age=t.getFullYear()-b.getFullYear(); const m=t.getMonth()-b.getMonth(); if(m<0||(m===0&&t.getDate()<b.getDate()))age--; return age; };

  const sendOtp = async () => {
    if (!email || !email.includes('@')) { showToast("Enter a valid email", COLORS.red); return; }
    setLoading(true);
    try {
      const data = await api("/auth/email-signup-init", "POST", { email });
      if (data.demo_otp) setDemoOtp(data.demo_otp);
      setStep("otp");
      showToast("OTP sent! 📧", COLORS.green);
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  const verifyOtp = async () => {
    if (!otp || otp.length < 4) { showToast("Enter OTP", COLORS.red); return; }
    setLoading(true);
    try {
      await api("/auth/email-verify-init", "POST", { email, otp });
      setStep("details");
      showToast("Email verified! ✅", COLORS.green);
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  const createAccount = async () => {
    if(!name.trim()||!username.trim()||!dob||password.length<6){setError("Name, username, DOB aur password (min 6) required");return;}
    if(!/^[a-z0-9_]+$/.test(username)){setError("Username: sirf lowercase, numbers, underscore");return;}
    if(calcAge(dob)<13){setError("Account banane ke liye 13 saal ka hona zaroori hai");return;}
    if(password!==confirmPassword){setError("Passwords match nahi kar rahe ❌");return;}
    if(!agreed){setError("Terms of Service aur Privacy Policy accept karo");return;}
    setError("");
    setLoading(true);
    try {
      const data = await api("/auth/email-signup", "POST", { email, name, username, password, dob });
      onSuccess(data.token, data.requires_phone);
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  return (
    <div style={{ minHeight:"100vh", background:COLORS.dark, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ background:"#ffffff", border:`1px solid ${COLORS.yellow}`, borderRadius:24, padding:32, width:"100%", maxWidth:400 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ fontSize:56, fontWeight:900, letterSpacing:8 }}><span style={{color:'#FFD600'}}>P</span><span style={{color:'#00C853'}}>O</span><span style={{color:'#FF1744'}}>S</span><span style={{color:'#29B6F6'}}>T</span></div>
          <div style={{ color:COLORS.muted, fontSize:14, marginTop:8 }}>
            {step==="email" ? "Join the world 🌐" : step==="otp" ? "Verify OTP" : "Create Account"}
          </div>
        </div>

        {step==="email" && <>
          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email" type="email" style={inputStyle} />
          <button onClick={sendOtp} disabled={loading} style={{...btnStyle, marginTop:20, opacity:loading?0.7:1}}>
            {loading ? "Sending..." : "SEND OTP →"}
          </button>
        </>}

        {step==="otp" && <>
          <div style={{ color:COLORS.muted, fontSize:13, marginBottom:16, textAlign:"center" }}>
            OTP sent to: {email}
          </div>
          {demoOtp && <div style={{ background:"#0a1a0a", border:`1px solid ${COLORS.green}`, borderRadius:12, padding:"12px 16px", color:COLORS.green, fontWeight:900, fontSize:22, letterSpacing:6, textAlign:"center", marginBottom:16 }}>{demoOtp}</div>}
          <input value={otp} onChange={e=>setOtp(e.target.value.replace(/\D/g,''))} placeholder="4-digit OTP" maxLength={6} style={{...inputStyle, textAlign:"center", fontSize:24, letterSpacing:8}} />
          <button onClick={verifyOtp} disabled={loading} style={{...btnStyle, marginTop:20, opacity:loading?0.7:1}}>
            {loading ? "Verifying..." : "VERIFY →"}
          </button>
        </>}

        {step==="details" && <>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" style={inputStyle} />
          <div style={{position:"relative",marginTop:12}}>
            <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:COLORS.muted,fontSize:15}}>@</span>
            <input value={username} onChange={e=>setUsername(e.target.value.toLowerCase().replace(/[^a-z0-9_]/g,""))} placeholder="username" style={{...inputStyle,paddingLeft:30}} />
          </div>
          <div style={{marginTop:12}}>
            <div style={{color:COLORS.muted,fontSize:12,marginBottom:6}}>Date of Birth</div>
            <input value={dob} onChange={e=>setDob(e.target.value)} type="date" max={new Date().toISOString().split("T")[0]} style={{...inputStyle,colorScheme:"light"}} />
          </div>
          <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="Password (min 6)" type="password" style={{...inputStyle, marginTop:12}} />
          <input value={confirmPassword} onChange={e=>setConfirmPassword(e.target.value)} placeholder="Confirm Password" type="password" style={{...inputStyle,marginTop:12,borderColor:confirmPassword&&password!==confirmPassword?COLORS.red:"#333"}} />
          <div onClick={()=>setAgreed(!agreed)} style={{display:"flex",alignItems:"flex-start",gap:10,marginTop:16,cursor:"pointer"}}>
            <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${agreed?COLORS.yellow:"#444"}`,background:agreed?COLORS.yellow:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
              {agreed&&<span style={{color:"#000",fontWeight:900,fontSize:13}}>✓</span>}
            </div>
            <div style={{color:COLORS.muted,fontSize:12,lineHeight:1.5}}>
              Main <span style={{color:COLORS.yellow,fontWeight:700}}>Terms of Service</span> aur <span style={{color:COLORS.yellow,fontWeight:700}}>Privacy Policy</span> se sehmat hoon
            </div>
          </div>
          {error&&<div style={{color:COLORS.red,fontSize:13,marginTop:8,textAlign:"center"}}>{error}</div>}
          <button onClick={createAccount} disabled={loading} style={{...btnStyle, marginTop:20, opacity:loading?0.7:1}}>
            {loading ? "Creating..." : "CREATE ACCOUNT →"}
          </button>
        </>}

        <div style={{ textAlign:"center", marginTop:16 }}>
          <span onClick={onBack} style={{ color:COLORS.muted, cursor:"pointer", fontSize:14 }}>← Back</span>
        </div>
      </div>
    </div>
  );
}

// ── Phone Login Screen ────────────────────────────────────────
function PhoneLoginScreen({ onBack, onSuccess, showToast }) {
  const [phone, setPhone] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);

  const login = async () => {
    if (!phone || !password) { showToast("Enter phone and password", COLORS.red); return; }
    setLoading(true);
    try {
      const phoneNum = phone.startsWith('+') ? phone : `+91${phone}`;
      const data = await api("/auth/phone-login", "POST", { phone: phoneNum, password });
      onSuccess(data.token);
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  return (
    <div style={{ minHeight:"100vh", background:COLORS.dark, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ background:"#ffffff", border:`1px solid ${COLORS.yellow}`, borderRadius:24, padding:32, width:"100%", maxWidth:400 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ fontSize:56, fontWeight:900, letterSpacing:8 }}><span style={{color:'#FFD600'}}>P</span><span style={{color:'#00C853'}}>O</span><span style={{color:'#FF1744'}}>S</span><span style={{color:'#29B6F6'}}>T</span></div>
          <div style={{ color:COLORS.muted, fontSize:14, marginTop:8 }}>Sign In with Phone</div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <div style={{ background:"#f5f5f5", border:"1px solid #ddd", borderRadius:12, padding:"12px 16px", color:"#111111", fontSize:15, minWidth:70, textAlign:"center" }}>+91</div>
          <input value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,''))} placeholder="Phone number" type="tel" maxLength={10} style={{...inputStyle, flex:1}} />
        </div>
        <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="Password" type="password" style={{...inputStyle, marginTop:12}} />
        <button onClick={login} disabled={loading} style={{...btnStyle, marginTop:20, opacity:loading?0.7:1}}>
          {loading ? "Logging in..." : "LOGIN →"}
        </button>
        <div style={{ textAlign:"center", marginTop:16 }}>
          <span onClick={onBack} style={{ color:COLORS.muted, cursor:"pointer", fontSize:14 }}>← Back</span>
        </div>
      </div>
    </div>
  );
}

function PostApp() {
  const [screen, setScreen] = useState("splash");
  const [token, setToken] = useState(()=>localStorage.getItem("token")||null);
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState("home");
  const [toast, setToast] = useState(null);
  const [newToken, setNewToken] = useState(null);
  const [refBy, setRefBy] = useState(null);

  const showToast = (msg, color=COLORS.yellow) => { setToast({msg,color}); setTimeout(()=>setToast(null),3000); };

  useEffect(()=>{
    // Read ?ref= invite param from URL
    const params = new URLSearchParams(window.location.search);
    const ref = params.get("ref");
    if (ref) {
      setRefBy(decodeURIComponent(ref));
      // Clean URL so it doesn't persist on reload
      window.history.replaceState({}, "", window.location.pathname);
    }
    const t = setTimeout(()=>{
      setScreen(s => {
        if (s !== "splash") return s;
        // If invited and not logged in → go straight to signup
        if (ref && !localStorage.getItem("token")) return "signup";
        return "login";
      });
      if (ref && !localStorage.getItem("token")) {
        setTimeout(()=>setToast({ msg: `👋 ${decodeURIComponent(ref)} ne aapko invite kiya hai! Account banayein.`, color: COLORS.green }), 100);
        setTimeout(()=>setToast(null), 4000);
      }
    }, 2000);
    return ()=>clearTimeout(t);
  },[]);

  useEffect(()=>{
    if(token){ api("/auth/me","GET",null,token).then(u=>{setUser(u);setScreen("app");}).catch((e)=>{if(e&&e.secondaryRequired){setNewToken(token);setScreen(e.secondaryRequired==="phone"?"add-phone":"add-email");}else{localStorage.removeItem("token");setToken(null);setScreen("login");}}); }
  },[token]);

  if(screen==="splash") return <SplashScreen />;

  const handleLogin = async(identifier,password)=>{
    try{
      let d;
      if(identifier.includes("@")){
        d=await api("/auth/login","POST",{email:identifier,password});
      } else {
        const phoneNum = identifier.startsWith('+') ? identifier : `+91${identifier}`;
        d=await api("/auth/phone-login","POST",{phone:phoneNum,password});
      }
      localStorage.setItem("token",d.token); setToken(d.token);
    }catch(e){
      if(e.secondaryRequired){ showToast((e.secondaryRequired==="phone" ? "📱 Phone number" : "📧 Email") + " verify karna zaroori hai", COLORS.yellow); }
      else { showToast(e.message,COLORS.red); }
    }
  };
  const handleEmailSuccess = (tok, reqPhone)=>{ setNewToken(tok); setScreen(reqPhone ? "add-phone" : "account-created"); };
  const handlePhoneSuccess = (tok, reqEmail)=>{ setNewToken(tok); setScreen(reqEmail ? "add-email" : "account-created"); };
  const handleAccountCreatedDone = ()=>{ setScreen("profile-setup"); };
  const handleProfileSetupDone = ()=>{ localStorage.setItem("token",newToken); setToken(newToken); };
  const handleLogout = ()=>{ localStorage.removeItem("token"); setToken(null); setUser(null); setScreen("login"); };

  if(screen==="login") return <LoginScreen onLogin={handleLogin} onGoSignup={()=>setScreen("signup")} onGoPhoneSignup={()=>setScreen("phone-signup")} onGoForgot={()=>setScreen("forgot-password")} toast={toast} />;
  if(screen==="signup") return <EmailSignupScreen onBack={()=>setScreen("login")} onSuccess={handleEmailSuccess} showToast={showToast} refBy={refBy} />;
  if(screen==="account-created") return <AccountCreatedScreen onContinue={handleAccountCreatedDone} />;
  if(screen==="profile-setup") return <ProfileSetupScreen token={newToken} onDone={handleProfileSetupDone} showToast={showToast} />;
  if(screen==="phone-signup") return <PhoneSignupScreen onBack={()=>setScreen("login")} onSuccess={handlePhoneSuccess} showToast={showToast} refBy={refBy} />;
  if(screen==="phone-login") return <PhoneLoginScreen onBack={()=>setScreen("login")} onSuccess={(tok)=>{localStorage.setItem("token",tok);setToken(tok);}} showToast={showToast} />;
  if(screen==="add-phone") return <AddPhoneScreen token={newToken} onSuccess={(tok)=>{ setNewToken(tok); setScreen("account-created"); }} showToast={showToast} />;
  if(screen==="add-email") return <AddEmailScreen token={newToken} onSuccess={(tok)=>{ setNewToken(tok); setScreen("account-created"); }} showToast={showToast} />;
  if(screen==="forgot-password") return <ForgotPasswordScreen onBack={()=>setScreen("login")} showToast={showToast} />;
  if(!user) return <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text)",fontSize:24}}>Loading...</div>;

  return (
    <div style={{minHeight:"100vh",background:COLORS.dark,color:COLORS.text,paddingBottom:80}}>
      <Toast toast={toast} />
      <div style={{position:"sticky",top:0,background:"var(--nav-bg)",borderBottom:"1px solid var(--border)",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",zIndex:50}}>
        <span style={{fontSize:28,fontWeight:900,letterSpacing:6}}><span style={{color:'#FFD600'}}>P</span><span style={{color:'#00C853'}}>O</span><span style={{color:'#FF1744'}}>S</span><span style={{color:'#29B6F6'}}>T</span></span>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <button onClick={()=>setTab("invite")} title="Invite Friends" style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",color:tab==="invite"?"#FFD600":"#666"}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="17" y1="11" x2="23" y2="11"/></svg>
          </button>
          <button onClick={()=>setTab("settings")} title="Settings" style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",color:tab==="settings"?"#FFD600":"#666"}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>

        </div>
      </div>
      {tab==="home"&&<HomeTab token={token} user={user} showToast={showToast} />}
      {tab==="discover"&&<DiscoverTab token={token} user={user} showToast={showToast} />}
      {tab==="friends"&&<FriendsTab token={token} user={user} showToast={showToast} />}
      {tab==="messages"&&<MessagesTab token={token} user={user} showToast={showToast} />}
      {tab==="profile"&&<ProfileTab token={token} user={user} setUser={setUser} showToast={showToast} />}
      {tab==="settings"&&<SettingsScreen token={token} user={user} setUser={setUser} showToast={showToast} onBack={()=>setTab("profile")} onLoggedOut={handleLogout} />}
      {tab==="invite"&&<InviteFriendsScreen user={user} showToast={showToast} onBack={()=>setTab("home")} />}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"var(--nav-bg)",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-around",alignItems:"center",padding:"8px 0 10px",zIndex:50}}>
        {[
          {id:"home",label:t("home"),svg:(active)=><svg width="20" height="20" viewBox="0 0 24 24" fill={active?"#FFD600":"none"} stroke={active?"#FFD600":"#999"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
          {id:"discover",label:t("search"),svg:(active)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={active?"#FFD600":"#999"} strokeWidth="2.2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>},
          {id:"friends",label:t("friends"),svg:(active)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={active?"#FFD600":"#999"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>},
          {id:"messages",label:t("messages"),svg:(active)=><svg width="20" height="20" viewBox="0 0 24 24" fill={active?"#FFD600":"none"} stroke={active?"#FFD600":"#999"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>},
          {id:"profile",label:t("profile"),svg:(active)=><svg width="20" height="20" viewBox="0 0 24 24" fill={active?"#FFD600":"none"} stroke={active?"#FFD600":"#999"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>}
        ].map(({id,label,svg})=>(
          <button key={id} onClick={()=>setTab(id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"4px 12px",transition:"transform 0.15s",transform:tab===id?"scale(1.1)":"scale(1)"}}>
            {svg(tab===id)}
            <span style={{fontSize:10,color:tab===id?"#FFD600":"#999",fontWeight:tab===id?"700":"400"}}>{label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}


function ForgotPasswordScreen({ onBack, showToast }) {
  const [step, setStep] = useState("init"); // init | otp | reset | done
  const [identifier, setIdentifier] = useState("");
  const [otp, setOtp] = useState("");
  const [newPass, setNewPass] = useState("");
  const [confirmPass, setConfirmPass] = useState("");
  const [loading, setLoading] = useState(false);
  const [demoOtp, setDemoOtp] = useState(null);

  const sendOtp = async () => {
    if (!identifier.trim()) { showToast("Enter your email or phone", COLORS.red); return; }
    setLoading(true);
    try {
      const raw = identifier.trim();
      const finalId = !raw.includes("@") && !raw.startsWith("+") ? `+91${raw}` : raw;
      const d = await api("/auth/forgot-password-init", "POST", { identifier: finalId });
      setDemoOtp(d.demo_otp);
      showToast("OTP sent! Check your " + (d.method === "email" ? "email" : "phone"), COLORS.green);
      setStep("otp");
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  const verifyOtp = async () => {
    if (!otp.trim()) { showToast("Enter the OTP", COLORS.red); return; }
    setLoading(true);
    try {
      const raw2 = identifier.trim();
      const finalId2 = !raw2.includes("@") && !raw2.startsWith("+") ? `+91${raw2}` : raw2;
      await api("/auth/forgot-password-verify", "POST", { identifier: finalId2, otp: otp.trim() });
      showToast("OTP verified ✓", COLORS.green);
      setStep("reset");
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  const resetPass = async () => {
    if (newPass.length < 6) { showToast("Password must be at least 6 characters", COLORS.red); return; }
    if (newPass !== confirmPass) { showToast("Passwords don't match", COLORS.red); return; }
    setLoading(true);
    try {
      const raw3 = identifier.trim();
      const finalId3 = !raw3.includes("@") && !raw3.startsWith("+") ? `+91${raw3}` : raw3;
      await api("/auth/forgot-password-reset", "POST", { identifier: finalId3, otp: otp.trim(), new_password: newPass });
      showToast("Password reset! Please log in.", COLORS.green);
      setStep("done");
    } catch(e) { showToast(e.message, COLORS.red); }
    setLoading(false);
  };

  return (

          <div style={{fontSize:40,fontWeight:900,letterSpacing:6,marginBottom:8}}><span style={{color:'#FFD600'}}>P</span><span style={{color:'#00C853'}}>O</span><span style={{color:'#FF1744'}}>S</span><span style={{color:'#29B6F6'}}>T</span></div>
          <div style={{fontWeight:800,fontSize:18,color:"var(--text)"}}>Reset Password</div>

            {step==="init" && "Enter your email or phone number"}

            {step==="reset" && "Set your new password"}
            {step==="done" && "Password reset successfully!"}
          </div>
        </div>

        {step==="init" && <>
          <input value={identifier} onChange={e=>setIdentifier(e.target.value)}
            placeholder="Email or phone number" style={inputStyle}

            {loading ? "Sending..." : "Send OTP →"}

        {step==="otp" && <>

          <input value={otp} onChange={e=>setOtp(e.target.value)} placeholder="Enter 4-digit OTP"
            style={{...inputStyle,letterSpacing:8,textAlign:"center",fontSize:22,fontWeight:700}}

          <button onClick={verifyOtp} disabled={loading} style={{...btnStyle,marginTop:16,opacity:loading?0.7:1}}>
            {loading ? "Verifying..." : "Verify OTP →"}
          </button>
          <div style={{textAlign:"center",marginTop:12}}>
            <span onClick={sendOtp} style={{color:COLORS.yellow,cursor:"pointer",fontSize:13,fontWeight:700}}>Resend OTP</span>
          </div>
        </>}

        {step==="reset" && <>
          <input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)}
            placeholder="New password (min 6 chars)" style={inputStyle} />
          <input type="password" value={confirmPass} onChange={e=>setConfirmPass(e.target.value)}
            placeholder="Confirm new password" style={{...inputStyle,marginTop:12}}
            onKeyDown={e=>e.key==="Enter"&&resetPass()} />
          <button onClick={resetPass} disabled={loading} style={{...btnStyle,marginTop:16,opacity:loading?0.7:1}}>
            {loading ? "Resetting..." : "Reset Password ✓"}
          </button>
        </>}

        {step==="done" && <>
          <div style={{textAlign:"center",padding:"20px 0",fontSize:48}}>🎉</div>
          <button onClick={onBack} style={{...btnStyle}}>Back to Login →</button>
        </>}

        {step !== "done" && (
          <div style={{textAlign:"center",marginTop:16}}>
            <span onClick={onBack} style={{color:"var(--muted)",cursor:"pointer",fontSize:13}}>← Back to Login</span>
          </div>
        )}
      </div>
    </div>
  );
}

function AddPhoneScreen({ token, onSuccess, showToast }) {
  const [phone, setPhone] = useState("");
  const [step, setStep] = useState("input");
  const [otp, setOtp] = useState("");
  const [loading, setLoading] = useState(false);
  const sendOtp = async () => {
    const ph = phone.startsWith("+") ? phone : "+91" + phone;
    setLoading(true);
    try {
      const data = await api("/auth/add-phone-init", "POST", { phone: ph }, token);
      if (data.demo_otp) showToast("Demo OTP: " + data.demo_otp, COLORS.green);
      setStep("otp");
    } catch(e) { showToast(e.message || "Failed to send OTP", COLORS.red); }
    setLoading(false);
  };
  const verifyOtp = async () => {
    const ph = phone.startsWith("+") ? phone : "+91" + phone;
    setLoading(true);
    try {
      const data = await api("/auth/add-phone-verify", "POST", { phone: ph, otp }, token);
      showToast("Phone verified! ✅", COLORS.green);
      onSuccess(data.token || token);
    } catch(e) { showToast(e.message || "Incorrect OTP", COLORS.red); }
    setLoading(false);
  };
  return (
    <div style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>

          <div style={{ fontSize:48, marginBottom:8 }}>📱</div>

          <p style={{ color:"var(--muted)", fontSize:14, lineHeight:1.6 }}>Fake accounts रोकने के लिए आपको अपना <b>phone number verify</b> करना होगा।<br/>यह सिर्फ एक बार का process है।</p>

        {step === "input" ? (

            <button style={{ ...btnStyle, opacity: loading ? 0.7 : 1 }} onClick={sendOtp} disabled={loading}>{loading ? "Sending..." : "Send OTP →"}</button>
          </div>
        ) : (
          <div>
            <p style={{ color:"var(--muted)", fontSize:13, marginBottom:12 }}>OTP sent to <b>{phone.startsWith("+") ? phone : "+91" + phone}</b></p>
            <input style={{ ...inputStyle, marginBottom:14, letterSpacing:6, textAlign:"center", fontSize:20, fontWeight:700 }} placeholder="Enter 4-digit OTP" value={otp} onChange={e=>setOtp(e.target.value)} maxLength={4} type="tel" />

            <button style={{ width:"100%", marginTop:10, padding:"10px", background:"transparent", color:"var(--muted)", border:"none", cursor:"pointer", fontSize:13 }} onClick={()=>setStep("input")}>← Change number</button>
          </div>
        )}
      </div>
    </div>
  );
}

function ProfileSetupScreen({ token, onDone, showToast }) {
  const [bio,setBio]=useState(""); const [photo,setPhoto]=useState(null); const [photoPreview,setPhotoPreview]=useState(null); const [loading,setLoading]=useState(false);
  const fileRef=useRef(null);
  const handlePhoto=(e)=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{ setPhotoPreview(ev.target.result); setPhoto(ev.target.result); };
    reader.readAsDataURL(file);
  };
  const handleSave=async()=>{
    setLoading(true);
    try{
      const body={about:bio};
      if(photo)body.avatar_photo=photo;
      await api("/profile","PATCH",body,token);
      onDone();
    }catch(e){ showToast(e.message,COLORS.red); }
    setLoading(false);
  };
  return (
    <div style={{minHeight:"100vh",background:COLORS.dark,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#ffffff",border:`1px solid ${COLORS.yellow}`,borderRadius:24,padding:32,width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:40,fontWeight:900,color:COLORS.yellow}}>Profile Setup 🎨</div>
          <div style={{color:COLORS.muted,fontSize:14,marginTop:8}}>Apna chehra dikhao duniya ko!</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:24}}>
          <div onClick={()=>fileRef.current.click()} style={{width:100,height:100,borderRadius:28,background:photoPreview?"transparent":COLORS.yellow,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",border:`2px dashed ${COLORS.yellow}`,position:"relative"}}>
            {photoPreview
              ? <img src={photoPreview} style={{width:"100%",height:"100%",objectFit:"cover"}} />
              : <div style={{textAlign:"center"}}><div style={{fontSize:32}}>📷</div><div style={{fontSize:11,color:"#000",fontWeight:700,marginTop:4}}>Tap to add</div></div>
            }
          </div>
          <input ref={fileRef} type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}} />
          <div style={{color:COLORS.muted,fontSize:12,marginTop:8}}>Camera ya Gallery se photo lo</div>
        </div>
        <textarea value={bio} onChange={e=>setBio(e.target.value)} placeholder="Bio (optional) — apne baare mein kuch batao..." style={{...inputStyle,height:90,resize:"none"}} maxLength={150} />
        <div style={{color:COLORS.muted,fontSize:11,textAlign:"right",marginTop:4}}>{bio.length}/150</div>
        <button onClick={handleSave} disabled={loading} style={{...btnStyle,marginTop:16,opacity:loading?0.7:1}}>
          {loading?"Saving...":"SAVE & CONTINUE →"}
        </button>
        <button onClick={onDone} style={{...btnStyle,background:"transparent",color:COLORS.muted,border:"none",marginTop:8,fontSize:13}}>
          Skip for now
        </button>
      </div>
    </div>
  );
}

function HomeTab({ token, user, showToast }) {
  const [posts, setPosts] = useState([]);
  const [showCompose, setShowCompose] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(() => { loadPosts(); }, []);

  const loadPosts = async () => {
    try {
      const d = await api("/posts", "GET", null, token);
      setPosts(d.posts || d);
      setLoading(false);
    } catch (e) {
      showToast(e.message, COLORS.red);
      setLoading(false);
    }
  };

  const handleLike = async (pid, color) => {
    try { await api(`/posts/${pid}/like`, "POST", { color }, token); loadPosts(); } catch (e) { showToast(e.message, COLORS.red); }
  };
  const handleDelete = async (pid) => {
    try { await api(`/posts/${pid}`, "DELETE", null, token); showToast("Post deleted", COLORS.red); loadPosts(); } catch (e) { showToast(e.message, COLORS.red); }
  };
  const handleComment = async (pid, text) => {
    try { await api(`/posts/${pid}/comments`, "POST", { text }, token); loadPosts(); } catch (e) { showToast(e.message, COLORS.red); }
  };

  if (loading) {
    return <div style={{ textAlign: "center", padding: 40, color: COLORS.muted }}>Loading posts... ⏳</div>;
  }

  return (
    <div style={{ maxWidth: "1200px", margin: "0 auto", padding: "16px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "24px", paddingTop: "8px" }}>
        <div>
          <h2 style={{ fontSize: "24px", fontWeight: "900", marginBottom: "4px" }}>Feed 🌍</h2>
          <p style={{ color: COLORS.muted, fontSize: "13px" }}>{posts.length} posts from your network</p>
        </div>
        <button
          onClick={() => setShowCompose(true)}
          style={{ background: COLORS.yellow, color: "#000", border: "none", borderRadius: "14px", padding: "12px 20px", fontWeight: "900", fontSize: "14px", cursor: "pointer", display: "flex", alignItems: "center", gap: "8px" }}
        >
          ✦ New Post
        </button>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: "16px" }}>
        {posts.length === 0 ? (
          <div style={{ gridColumn: "1 / -1", textAlign: "center", padding: "60px 20px", color: COLORS.muted }}>
            <div style={{ fontSize: "48px", marginBottom: "16px" }}>🚀</div>
            <p>No posts yet. Be the first to post!</p>
          </div>
        ) : (
          posts.map((post, idx) => (
            <BentoPostCard key={post.id} post={post} user={user} onLike={handleLike} onDelete={handleDelete} onComment={handleComment} isLarge={idx % 5 === 0} />
          ))
        )}
      </div>

      {showCompose && (
        <ComposeModal token={token} user={user} onClose={() => setShowCompose(false)} onPost={() => { setShowCompose(false); loadPosts(); showToast("Posted! 🌍", COLORS.green); }} showToast={showToast} />
      )}
    </div>
  );
}

function MessagesTab({ token, user, showToast }) {
  const [friends,setFriends]=useState([]);
  const [selected,setSelected]=useState(null);
  const [messages,setMessages]=useState([]);
  const [translatedTexts,setTranslatedTexts]=useState({});
  const [text,setText]=useState("");
  const msgEnd=useRef(null);
  const translateOn = user.chat_translation_enabled !== false;
  const userLang = user.language || "en";

  useEffect(()=>{api("/friends","GET",null,token).then(d=>setFriends(d.friends)).catch(()=>{});},[]);

  useEffect(()=>{
    if(!selected)return;
    const load=()=>api(`/messages?with_user=${selected.id}`,"GET",null,token).then(msgs=>{
      setMessages(msgs);
      // Translate incoming messages if enabled
      if(translateOn && userLang !== "en") {
        msgs.forEach(m=>{
          if(m.from_id !== user.id && !translatedTexts[m.id]) {
            translateText(m.text, userLang).then(translated=>{
              if(translated !== m.text) {
                setTranslatedTexts(prev=>({...prev,[m.id]:translated}));
              }
            });
          }
        });
      }
    }).catch(()=>{});
    load(); const iv=setInterval(load,5000); return()=>clearInterval(iv);
  },[selected, translateOn, userLang]);

  useEffect(()=>msgEnd.current?.scrollIntoView({behavior:"smooth"}),[messages]);

  const sendMsg=async()=>{
    if(!text.trim()||!selected)return;
    try{
      await api("/messages","POST",{to_user_id:selected.id,text},token);
      setText("");
      const d=await api(`/messages?with_user=${selected.id}`,"GET",null,token);
      setMessages(d);
    }catch(e){showToast(e.message,COLORS.red);}
  };

  if(selected) return (
    <div style={{maxWidth:600,margin:"0 auto",display:"flex",flexDirection:"column",height:"calc(100vh - 130px)"}}>
      <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid #e0e0e0"}}>
        <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",color:COLORS.yellow,cursor:"pointer",fontSize:20}}>←</button>
        <div style={{width:36,height:36,borderRadius:10,background:selected.avatar_bg,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:16,color:"#000"}}>{(selected.avatar_letter||selected.name?.[0]||"?").toUpperCase()}</div>
        <div style={{fontWeight:700}}>{selected.name}</div>
        {translateOn && userLang !== "en" && <span style={{marginLeft:"auto",fontSize:10,color:COLORS.muted,background:"var(--card-bg)",border:"1px solid var(--border)",borderRadius:8,padding:"2px 8px"}}>🌐 Auto-translate ON</span>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:16}}>
        {messages.map(m=>{
          const isMine = m.from_id===user.id;
          const displayText = (!isMine && translateOn && translatedTexts[m.id]) ? translatedTexts[m.id] : m.text;
          const isTranslated = !isMine && translateOn && translatedTexts[m.id] && translatedTexts[m.id] !== m.text;
          return (
            <div key={m.id} style={{marginBottom:10,display:"flex",flexDirection:isMine?"row-reverse":"row",gap:8}}>
              <div>
                <div style={{background:isMine?COLORS.yellow:"#222",color:isMine?"#000":"#fff",borderRadius:14,padding:"8px 14px",maxWidth:260,fontSize:14,lineHeight:1.5}}>{displayText}</div>
                {isTranslated && <div style={{fontSize:10,color:COLORS.muted,marginTop:2,paddingLeft:4}}>🌐 Translated · <span style={{cursor:"pointer",textDecoration:"underline"}} onClick={()=>setTranslatedTexts(p=>({...p,[m.id]:null}))}>See original</span></div>}
              </div>
            </div>
          );
        })}
        <div ref={msgEnd} />
      </div>
      <div style={{padding:"10px 16px",borderTop:"1px solid #e0e0e0",display:"flex",gap:10}}>
        <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMsg()} placeholder="Message..." style={{...inputStyle,flex:1,marginBottom:0}} />
        <button onClick={sendMsg} style={{background:COLORS.yellow,color:"#000",border:"none",borderRadius:12,padding:"10px 18px",fontWeight:700,cursor:"pointer"}}>Send</button>
      </div>
    </div>
  );

  return (
    <div style={{maxWidth:600,margin:"0 auto",padding:16}}>
      <div style={{fontWeight:700,color:COLORS.yellow,marginBottom:12,fontSize:13,letterSpacing:2}}>{t("messages").toUpperCase()} 💬</div>
      {friends.length===0&&<div style={{color:COLORS.muted,textAlign:"center",padding:40}}>Add friends to start chatting!</div>}
      {friends.map(f=>(
        <div key={f.id} onClick={()=>setSelected(f)} style={{background:COLORS.card,border:"1px solid #e0e0e0",borderRadius:16,padding:"14px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
          <div style={{width:44,height:44,borderRadius:14,background:normalizeColor(f.avatar_bg)||COLORS.yellow,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:18,color:"#000"}}>{(f.avatar_letter||f.name?.[0]||"?").toUpperCase()}</div>
          <div><div style={{fontWeight:700}}>{f.name}</div><div style={{color:COLORS.muted,fontSize:12}}>{f.handle}</div></div>
        </div>
      ))}
    </div>
  );
}

function ProfileTab({ token, user, setUser, showToast }) {

  const [username, setUsername] = useState((user.username || user.handle || "").replace("@",""));
  const [about, setAbout] = useState(user.about || "");
  const [location, setLocation] = useState(user.location || "");
  const [website, setWebsite] = useState(user.website || "");
  const [category, setCategory] = useState(user.category || "");
  const [gender, setGender] = useState(user.gender || "");
  const [dob, setDob] = useState(user.dob || "");
  const [avatarBg, setAvatarBg] = useState(user.avatar_bg || COLORS.yellow);
  const [avatarPhoto, setAvatarPhoto] = useState(user.avatar_photo || null);
  const [coverPhoto, setCoverPhoto] = useState(user.cover_photo || null);
  const [profileVideo, setProfileVideo] = useState(user.profile_video || null);
  const [coverVideo, setCoverVideo] = useState(user.cover_video || null);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    api(`/users/${user.id}`, "GET", null, token)
      .then(d => { if (d.stats) setStats(d.stats); })
      .catch(() => {});
  }, []);

  const handlePhoto = (e, setter) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast("Max 5MB allowed", COLORS.red); return; }
    const reader = new FileReader();
    reader.onload = ev => setter(ev.target.result);
    reader.readAsDataURL(file);
  };

  const handleVideo = (e, setter, maxSec) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 30 * 1024 * 1024) { showToast("Max 30MB allowed", COLORS.red); return; }
    const vid = document.createElement("video");
    vid.preload = "metadata";
    vid.onloadedmetadata = () => {
      URL.revokeObjectURL(vid.src);
      if (vid.duration > maxSec + 2) { showToast(`Max ${maxSec} seconds allowed`, COLORS.red); return; }
      const reader = new FileReader();
      reader.onload = ev => setter(ev.target.result);
      reader.readAsDataURL(file);
    };
    vid.src = URL.createObjectURL(file);
  };

  const save = async () => {
    setSaving(true);
    try {
      const u = await api("/profile", "PATCH", {
        name, location, about, website,
        avatar_bg: avatarBg,
        avatar_photo: avatarPhoto,
        cover_photo: coverPhoto,
        profile_video: profileVideo,
        cover_video: coverVideo,
        username: username.toLowerCase().replace(/[^a-z0-9_]/g, ""),
        handle: `@${username.toLowerCase().replace(/[^a-z0-9_]/g, "")}`,
        category,
        gender,
        dob
      }, token);
      setUser(u);
      setEditing(false);
      showToast("Profile updated! ✓", COLORS.green);
    } catch(e) { showToast(e.message, COLORS.red); }
    setSaving(false);

        {coverVideo
          ? <video src={coverVideo} autoPlay muted loop playsInline style={{ width:"100%", height:"100%", objectFit:"cover" }} />
          : coverPhoto && <img src={coverPhoto} style={{ width: "100%", height: "100%", objectFit: "cover" }} />}
        {editing && (
          <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.38)", display:"flex", alignItems:"center", justifyContent:"center", gap:12 }}>
            <label style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4, cursor:"pointer" }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <span style={{ color:"#fff", fontSize:11, fontWeight:700 }}>Photo</span>
              <input type="file" accept="image/*" style={{ display:"none" }} onChange={e => { handlePhoto(e, setCoverPhoto); setCoverVideo(null); }} />
            </label>
            <div style={{ width:1, height:36, background:"rgba(255,255,255,0.4)" }} />
            <label style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4, cursor:"pointer" }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>

              {user.location && <span style={{ color: COLORS.muted, fontSize: 13, display: "flex", alignItems: "center", gap: 4 }}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>{user.location}</span>}
              {user.website && <a href={user.website.startsWith("http")?user.website:`https://${user.website}`} target="_blank" style={{ color: COLORS.blue, fontSize: 13, textDecoration: "none", display: "flex", alignItems: "center", gap: 4 }}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>{user.website.replace("https://","").replace("http://","")}</a>}
            </div>

            {/* Stats */}
            <div style={{ display: "flex", borderTop: "1px solid #f0f0f0", borderBottom: "1px solid #f0f0f0", margin: "14px 0", padding: "12px 0" }}>
              {[["Posts", fmtNum(stats.posts)], ["Followers", fmtNum(stats.followers)], ["Following", fmtNum(stats.following)]].map(([label, val]) => (
                <div key={label} style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontWeight: 900, fontSize: 22 }}>{val}</div>
                  <div style={{ color: COLORS.muted, fontSize: 12, marginTop: 2 }}>{label}</div>
                </div>
              ))}
            </div>

          </>
        ) : (
          <div style={{ marginTop: 8 }}>
            {[
              ["NAME", name, setName, "Your name", "text"],
              ["LOCATION", location, setLocation, "City, Country", "text"],
              ["WEBSITE", website, setWebsite, "https://yoursite.com", "url"]
            ].map(([label, val, setter, ph, type]) => (
              <div key={label} style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, color: COLORS.muted, fontWeight: 700, letterSpacing: 1, marginBottom: 5 }}>{label}</div>
                <input value={val} onChange={e => setter(e.target.value)} placeholder={ph} type={type} style={inputStyle} />
              </div>
            ))}

            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, color: COLORS.muted, fontWeight: 700, letterSpacing: 1, marginBottom: 5 }}>CATEGORY</div>
              <select value={category} onChange={e=>setCategory(e.target.value)} style={{ ...inputStyle, appearance:"none", WebkitAppearance:"none", cursor:"pointer" }}>
                <option value="">Select category...</option>
                {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>

            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, color: COLORS.muted, fontWeight: 700, letterSpacing: 1, marginBottom: 5 }}>GENDER</div>
              <select value={gender} onChange={e=>setGender(e.target.value)} style={{ ...inputStyle, appearance:"none", WebkitAppearance:"none", cursor:"pointer" }}>
                <option value="">Select gender...</option>
                {["Male","Female","Non-binary","Transgender","Prefer not to say"].map(g=><option key={g} value={g}>{g}</option>)}
              </select>
            </div>

            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, color: COLORS.muted, fontWeight: 700, letterSpacing: 1, marginBottom: 5 }}>DATE OF BIRTH</div>
              <input type="date" value={dob} onChange={e=>setDob(e.target.value)} max={new Date().toISOString().split("T")[0]} style={inputStyle} />
            </div>

            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, color: COLORS.muted, fontWeight: 700, letterSpacing: 1, marginBottom: 5 }}>USERNAME</div>
              <div style={{ position: "relative" }}>
                <span style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", color: COLORS.muted, fontSize: 15 }}>@</span>
                <input value={username} onChange={e => setUsername(e.target.value.toLowerCase().replace(/[^a-z0-9_]/g,""))} placeholder="username" style={{ ...inputStyle, paddingLeft: 30 }} />
              </div>
            </div>

            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, color: COLORS.muted, fontWeight: 700, letterSpacing: 1, marginBottom: 5 }}>BIO</div>
              <textarea value={about} onChange={e => setAbout(e.target.value)} placeholder="Write something about yourself..." style={{ ...inputStyle, height: 80, resize: "none" }} />
            </div>

            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 11, color: COLORS.muted, fontWeight: 700, letterSpacing: 1, marginBottom: 8 }}>AVATAR COLOUR</div>
              <div style={{ display: "flex", gap: 12 }}>
                {ACCENTS.map(c => (
                  <button key={c} onClick={() => setAvatarBg(c)} style={{ width: 38, height: 38, borderRadius: "50%", background: c, border: avatarBg === c ? "3px solid #111" : "3px solid transparent", cursor: "pointer", transform: avatarBg === c ? "scale(1.2)" : "scale(1)", transition: "all 0.2s" }} />
                ))}
              </div>
            </div>

            <button onClick={save} disabled={saving} style={{ ...btnStyle, opacity: saving ? 0.7 : 1 }}>{saving ? "Saving..." : "Save Changes ✓"}</button>
            <button onClick={() => setEditing(false)} style={{ ...btnStyle, background: "#e0e0e0", color: "#111", marginTop: 8 }}>Cancel</button>
          </div>
        )}
      </div>
    </div>
  );
}

const LANGUAGES = [
  ["en","English"],["hi","Hindi"],["ur","Urdu"],["es","Spanish"],["fr","French"],
  ["ar","Arabic"],["pt","Portuguese"],["de","German"],["zh","Chinese"],["ja","Japanese"],
  ["ru","Russian"],["bn","Bengali"],["id","Indonesian"],["tr","Turkish"]
];

function SettingRow({ label, sub, right }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 0", borderBottom:"1px solid var(--border)" }}>
      <div>
        <div style={{ fontSize:14, fontWeight:700, color:"var(--text)" }}>{label}</div>
        {sub && <div style={{ fontSize:12, color:"var(--muted)", marginTop:2 }}>{sub}</div>}
      </div>
      {right}
    </div>
  );
}

function Toggle({ on, onChange }) {
  return (
    <button onClick={()=>onChange(!on)} style={{ width:44, height:26, borderRadius:14, border:"none", cursor:"pointer", background: on ? COLORS.green : "#ccc", position:"relative", transition:"background 0.2s", flexShrink:0 }}>
      <div style={{ width:20, height:20, borderRadius:"50%", background:"#fff", position:"absolute", top:3, left: on ? 21 : 3, transition:"left 0.2s", boxShadow:"0 1px 3px rgba(0,0,0,0.3)" }} />
    </button>
  );
}

function SettingsSection({ title, children }) {
  return (
    <div style={{ marginBottom:24 }}>
      <div style={{ fontSize:12, fontWeight:800, color:COLORS.muted, letterSpacing:1, marginBottom:6, textTransform:"uppercase" }}>{title}</div>
      <div style={{ background:"var(--card-bg)", borderRadius:16, padding:"4px 16px", border:"1px solid var(--border)" }}>{children}</div>
    </div>
  );
}

function SettingsScreen({ token, user, setUser, showToast, onBack, onLoggedOut }) {
  const [notifPrefs, setNotifPrefs] = useState(user.notifications_prefs || { likes:true, comments:true, friend_requests:true, messages:true });
  const [isPrivate, setIsPrivate] = useState(!!user.is_private);
  const [theme, setTheme] = useState(user.theme || "dark");
  const [translateOn, setTranslateOn] = useState(user.chat_translation_enabled !== false);
  const [language, setLanguage] = useState(user.language || "en");
  const [blocked, setBlocked] = useState([]);
  const [showBlocked, setShowBlocked] = useState(false);
  const [showPassword, setShowPassword] = useState(false);
  const [showDelete, setShowDelete] = useState(false);
  const [showHelp, setShowHelp] = useState(false);
  const [curPass, setCurPass] = useState(""); const [newPass, setNewPass] = useState(""); const [confirmPass, setConfirmPass] = useState("");
  const [savingPass, setSavingPass] = useState(false);
  const [deletionStatus, setDeletionStatus] = useState(null);

  useEffect(() => {
    api("/account/deletion-status", "GET", null, token).then(setDeletionStatus).catch(()=>{});
  }, []);

  const loadBlocked = () => {
    api("/users/me/blocked", "GET", null, token).then(setBlocked).catch(()=>{});
    setShowBlocked(true);
  };

  const unblock = async (id) => {
    try { await api(`/users/${id}/unblock`, "POST", null, token); setBlocked(b => b.filter(x => x.id !== id)); showToast("Unblocked", COLORS.green); }
    catch(e) { showToast(e.message, COLORS.red); }
  };

  const patchProfile = async (fields) => {
    try { const u = await api("/profile", "PATCH", fields, token); setUser(u); }
    catch(e) { showToast(e.message, COLORS.red); }
  };

  const togglePrivate = (val) => { setIsPrivate(val); patchProfile({ is_private: val }); showToast(val ? "Account set to Private" : "Account set to Public", COLORS.green); };
  const toggleTheme = (isDark) => { const t = isDark ? "dark" : "light"; setTheme(t); applyTheme(t); patchProfile({ theme: t }); showToast(`${isDark ? "Dark" : "Light"} theme saved`, COLORS.green); };
  const toggleTranslate = (val) => { setTranslateOn(val); patchProfile({ chat_translation_enabled: val }); showToast(val ? "Auto-translation on" : "Auto-translation off", COLORS.green); };
  const changeLanguage = (newLang) => { setLanguage(newLang); setAppLang(newLang); patchProfile({ language: newLang }); showToast("Language updated ✓", COLORS.green); setTimeout(()=>window.location.reload(), 800); };

  const toggleNotif = async (key, val) => {
    const next = { ...notifPrefs, [key]: val };
    setNotifPrefs(next);
    try { await api("/settings/notifications", "PATCH", { [key]: val }, token); }
    catch(e) { showToast(e.message, COLORS.red); setNotifPrefs(notifPrefs); }
  };

  const submitPasswordChange = async () => {
    if (newPass.length < 6) { showToast("New password must be at least 6 characters", COLORS.red); return; }
    if (newPass !== confirmPass) { showToast("Passwords don't match", COLORS.red); return; }
    setSavingPass(true);
    try {
      await api("/settings/change-password", "POST", { current_password: curPass, new_password: newPass }, token);
      showToast("Password changed ✓", COLORS.green);
      setShowPassword(false); setCurPass(""); setNewPass(""); setConfirmPass("");
    } catch(e) { showToast(e.message, COLORS.red); }
    setSavingPass(false);
  };

  const requestDelete = async () => {
    try {
      const d = await api("/account/delete-request", "POST", null, token);
      showToast(d.message, COLORS.yellow);
      setDeletionStatus({ pending_delete: true, restore_deadline: d.restore_deadline });
      setShowDelete(false);
    } catch(e) { showToast(e.message, COLORS.red); }
  };

  const restoreAccount = async () => {
    try { await api("/account/restore", "POST", null, token); showToast("Account restored ✓", COLORS.green); setDeletionStatus({ pending_delete: false }); }
    catch(e) { showToast(e.message, COLORS.red); }
  };

  const inputStyle = { width:"100%", padding:"12px 14px", borderRadius:12, border:`1.5px solid var(--border)`, fontSize:14, outline:"none", background:"var(--input-bg)", color:"var(--text)" };
  const btnStyle = { width:"100%", padding:"12px", borderRadius:12, border:"none", fontWeight:800, fontSize:14, cursor:"pointer" };

  return (
    <div style={{ maxWidth:600, margin:"0 auto", padding:"20px 16px 40px", background:"var(--bg)", minHeight:"100vh" }}>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
        <button onClick={onBack} style={{ background:"none", border:"none", cursor:"pointer", fontSize:20 }}>←</button>
        <div style={{ fontSize:22, fontWeight:900, color:"var(--text)" }}>{t("settings")}</div>
      </div>

      <SettingsSection title={t("privacy")}>
        <SettingRow label="Private Account" sub="Only approved followers can see your posts" right={<Toggle on={isPrivate} onChange={togglePrivate} />} />
      </SettingsSection>

      <SettingsSection title={t("security")}>
        <div style={{ padding:"14px 0" }} onClick={()=>setShowPassword(true)}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer" }}>
            <div style={{ fontSize:14, fontWeight:700 }}>Change Password</div>
            <span style={{ color:COLORS.muted }}>›</span>
          </div>
        </div>
        {showPassword && (
          <div style={{ paddingBottom:16 }}>
            <input type="password" value={curPass} onChange={e=>setCurPass(e.target.value)} placeholder="Current password" style={{ ...inputStyle, marginBottom:8 }} />
            <input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="New password" style={{ ...inputStyle, marginBottom:8 }} />
            <input type="password" value={confirmPass} onChange={e=>setConfirmPass(e.target.value)} placeholder="Confirm new password" style={{ ...inputStyle, marginBottom:10 }} />
            <button onClick={submitPasswordChange} disabled={savingPass} style={{ ...btnStyle, background:COLORS.blue, color:"#fff", opacity:savingPass?0.7:1 }}>{savingPass ? "Saving..." : "Update Password"}</button>
          </div>
        )}
      </SettingsSection>

      <SettingsSection title={t("language")}>
        <select value={language} onChange={e=>changeLanguage(e.target.value)} style={{ ...inputStyle, border:"none", padding:"14px 0", cursor:"pointer" }}>
          {LANGUAGES.map(([code,name])=><option key={code} value={code}>{name}</option>)}
        </select>
      </SettingsSection>

      <SettingsSection title={t("darkMode")}>
        <SettingRow label={t("darkMode")} sub="Switch between light and dark appearance" right={<Toggle on={theme==="dark"} onChange={toggleTheme} />} />
      </SettingsSection>

      <SettingsSection title={t("notifications")}>
        <SettingRow label="Likes" right={<Toggle on={!!notifPrefs.likes} onChange={v=>toggleNotif("likes",v)} />} />
        <SettingRow label="Comments" right={<Toggle on={!!notifPrefs.comments} onChange={v=>toggleNotif("comments",v)} />} />
        <SettingRow label="Friend Requests" right={<Toggle on={!!notifPrefs.friend_requests} onChange={v=>toggleNotif("friend_requests",v)} />} />
        <SettingRow label="Messages" right={<Toggle on={!!notifPrefs.messages} onChange={v=>toggleNotif("messages",v)} />} />
      </SettingsSection>

      <SettingsSection title="Chat Translation">
        <SettingRow label="Auto-Translate Messages" sub="Read and write in your own language" right={<Toggle on={translateOn} onChange={toggleTranslate} />} />
      </SettingsSection>

      <SettingsSection title="Blocked Users">
        <div style={{ padding:"14px 0", cursor:"pointer" }} onClick={loadBlocked}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div style={{ fontSize:14, fontWeight:700 }}>Manage Blocked Users</div>
            <span style={{ color:COLORS.muted }}>›</span>
          </div>
        </div>
        {showBlocked && (
          <div style={{ paddingBottom:12 }}>
            {blocked.length === 0 && <div style={{ color:COLORS.muted, fontSize:13, padding:"6px 0" }}>No blocked users</div>}
            {blocked.map(b => (
              <div key={b.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0" }}>
                <div style={{ fontSize:14, fontWeight:700 }}>{b.name} <span style={{ color:COLORS.muted, fontWeight:400 }}>@{(b.username||"").toString()}</span></div>
                <button onClick={()=>unblock(b.id)} style={{ ...btnStyle, width:"auto", padding:"6px 14px", background:"#eee", color:"#111", fontSize:12 }}>Unblock</button>
              </div>
            ))}
          </div>
        )}
      </SettingsSection>

      <SettingsSection title="Help & Support">
        <div style={{ padding:"14px 0", cursor:"pointer" }} onClick={()=>setShowHelp(s=>!s)}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div style={{ fontSize:14, fontWeight:700 }}>Contact Support</div>
            <span style={{ color:COLORS.muted }}>›</span>
          </div>
        </div>
        {showHelp && (
          <div style={{ paddingBottom:14, fontSize:13, color:COLORS.muted, lineHeight:1.6 }}>
            Need help? Email us at <a href="mailto:support@postbluom.online" style={{ color:COLORS.blue }}>support@postbluom.online</a> and we'll get back to you as soon as possible.
          </div>
        )}
      </SettingsSection>

      <SettingsSection title="Delete Account">
        {deletionStatus?.pending_delete ? (
          <div style={{ padding:"14px 0" }}>
            <div style={{ fontSize:13, color:COLORS.red, fontWeight:700, marginBottom:10 }}>Your account is scheduled for deletion. Restore it before {deletionStatus.restore_deadline ? new Date(deletionStatus.restore_deadline).toLocaleDateString() : "the deadline"}.</div>
            <button onClick={restoreAccount} style={{ ...btnStyle, background:COLORS.green, color:"#fff" }}>Restore My Account</button>
          </div>
        ) : (
          <div style={{ padding:"14px 0" }}>
            {!showDelete ? (
              <button onClick={()=>setShowDelete(true)} style={{ ...btnStyle, background:"#fff0f0", color:COLORS.red, border:`1.5px solid ${COLORS.red}` }}>Delete My Account</button>
            ) : (
              <div>
                <div style={{ fontSize:13, color:COLORS.muted, marginBottom:10 }}>Your account will be hidden immediately and permanently deleted after 30 days unless you log back in and restore it. Continue?</div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={requestDelete} style={{ ...btnStyle, background:COLORS.red, color:"#fff" }}>Yes, Delete</button>
                  <button onClick={()=>setShowDelete(false)} style={{ ...btnStyle, background:"#eee", color:"#111" }}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        )}
      </SettingsSection>

      <button onClick={onLoggedOut} style={{ ...btnStyle, background:"none", border:"1.5px solid var(--border)", color:"var(--muted)", marginTop:4 }}>{t("logout")}</button>
    </div>
  );
}

function ShareButton({ label, color, icon, onClick }) {
  return (
    <button onClick={onClick} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:6, background:"none", border:"none", cursor:"pointer", width:72 }}>
      <div style={{ width:52, height:52, borderRadius:16, background:color, display:"flex", alignItems:"center", justifyContent:"center", color:"#fff" }}>{icon}</div>
      <span style={{ fontSize:11, fontWeight:700, color:"var(--text)", textAlign:"center" }}>{label}</span>
    </button>
  );
}

      </div>

      <div style={{ textAlign:"center", marginBottom:24 }}>
        <div style={{ fontSize:15, color:COLORS.muted, marginBottom:16 }}>Invite friends to join POST and grow your circle 🚀</div>
        <div style={{ display:"inline-block", background:"var(--card-bg)", borderRadius:20, padding:16, border:"1px solid var(--border)" }}>
          <img src={qrUrl} alt="Invite QR code" width={220} height={220} style={{ display:"block", borderRadius:8 }} />
        </div>
      </div>

      <div style={{ background:"var(--card-bg)", border:"1px solid var(--border)", borderRadius:16, padding:"12px 14px", display:"flex", alignItems:"center", gap:10, marginBottom:24 }}>
        <div style={{ flex:1, fontSize:13, color:"var(--muted)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{inviteUrl}</div>
        <button onClick={copyLink} style={{ background:COLORS.blue, color:"#fff", border:"none", borderRadius:10, padding:"8px 14px", fontWeight:700, fontSize:12, cursor:"pointer", flexShrink:0 }}>Copy</button>
      </div>

      <div style={{ fontSize:12, fontWeight:800, color:COLORS.muted, letterSpacing:1, marginBottom:12, textTransform:"uppercase" }}>Share via</div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:14, justifyContent:"flex-start" }}>
        {channels.map(c => <ShareButton key={c.label} label={c.label} color={c.color} icon={c.icon} onClick={c.onClick} />)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PostApp />);
</script>
</body>
</html>
